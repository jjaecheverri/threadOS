// ═══════════════════════════════════════════════════════════════════════════
// AGENT RETURN SCHEMA  — the contract between ThreadOS and any AI agent
// ═══════════════════════════════════════════════════════════════════════════
const SCHEMA = {
  required: ['outputSummary','changesMade','nextStep'],
  typed: {
    runId:         'string',
    tool:          'string',
    outputSummary: 'string',
    changesMade:   'string',
    nextStep:      'string',
    confidence:    'number',    // 0–1, self-reported by agent
    producedAssets:['string'], // array of filenames/paths
    decisions:     'array',
    tasks:         'array',
  },
  minLen: {
    outputSummary: 20,
    changesMade:   10,
    nextStep:      10,
  },
  maxLen: {
    outputSummary: 2000,
    nextStep:      400,
  },
};

// Validate agent return against SCHEMA — returns { valid, errors, warnings, score }
function validateSchema(data) {
  const errors = [], warnings = [];
  let score = 100;

  // Required fields
  for (const f of SCHEMA.required) {
    if (!data[f] || !String(data[f]).trim()) {
      const labels = { outputSummary:'output summary', changesMade:'what changed', nextStep:'next step' };
      errors.push(`The agent didn't include a ${labels[f]||f} in its response`);
      score -= 30;
    }
  }

  // Min length
  for (const [f, min] of Object.entries(SCHEMA.minLen)) {
    if (data[f] && String(data[f]).trim().length < min) {
      const labels = { outputSummary:'output summary', changesMade:'what changed', nextStep:'next step' };
      errors.push(`The ${labels[f]||f} is too short to be useful (needs at least ${min} characters)`);
      score -= 15;
    }
  }

  // Max length
  for (const [f, max] of Object.entries(SCHEMA.maxLen)) {
    if (data[f] && String(data[f]).trim().length > max) {
      const labels = { outputSummary:'output summary', nextStep:'next step' };
      warnings.push(`The ${labels[f]||f} is very long — a more focused response is easier to verify`);
      score -= 5;
    }
  }

  // Confidence bounds
  if (data.confidence != null) {
    if (typeof data.confidence !== 'number' || data.confidence < 0 || data.confidence > 1) {
      errors.push(`Confidence should be a number between 0 and 1 (the agent returned: ${data.confidence})`);
      score -= 10;
    }
  } else {
    warnings.push("The agent didn't report confidence — consider asking it to rate its certainty");
  }

  // nextStep quality heuristics
  if (data.nextStep) {
    const ns = data.nextStep.trim().toLowerCase();
    const vague = ['continue', 'proceed', 'keep going', 'do more', 'finish', 'work on it'];
    if (vague.some(v => ns === v || ns.startsWith(v + ' '))) {
      warnings.push('The next step is vague — a good next step names exactly what to do and how');
      score -= 10;
    }
    if (ns.length > 0 && !ns.match(/[a-z]/)) {
      warnings.push("The next step doesn't seem to contain an action — it should describe what to do");
      score -= 5;
    }
  }

  // producedAssets format check
  if (data.producedAssets) {
    const assets = Array.isArray(data.producedAssets) ? data.producedAssets : [data.producedAssets];
    assets.forEach(a => {
      if (typeof a === 'string' && !a.match(/\.\w{1,6}$/) && !a.match(/^https?:\/\//)) {
        warnings.push(`"${a.slice(0,40)}" doesn't look like a filename — include the extension so it's clear what was created`);
      }
    });
  }

  return {
    valid: errors.length === 0,
    errors,
    warnings,
    schemaScore: clamp(score, 0, 100),
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// VERIFICATION ENGINE v2  — multi-signal scoring
// ═══════════════════════════════════════════════════════════════════════════
const STOP = new Set(['a','an','the','and','or','but','in','on','at','to','for','of','with','by','is','are','was','were','be','been','have','has','do','does','did','will','would','could','should','that','this','it','they','then','when','if','as','so','all','any','not','use','make','new','each','from','get','set','run','build','into','via','per','also','both']);

function extractTerms(text) {
  return [...new Set(
    text.toLowerCase()
      .replace(/[^a-z0-9\s]/g,' ')
      .split(/\s+/)
      .filter(w => w.length > 3 && !STOP.has(w))
  )].slice(0, 24);
}

function verifyResult({ instruction='', outputSummary='', schemaResult, confidence=null, runId=null, expectedRunId=null }) {
  const terms = extractTerms(instruction);
  const summaryLower = outputSummary.toLowerCase();
  const matched = terms.filter(t => summaryLower.includes(t));
  const missing  = terms.filter(t => !summaryLower.includes(t));
  const coverage = terms.length > 0 ? matched.length / terms.length : 0;

  // Run ID chain check
  let runIdStatus = 'no_pending';
  let runIdScore  = 0.5;
  if (expectedRunId) {
    if (!runId)              { runIdStatus = 'missing';    runIdScore = 0.2; }
    else if (runId === expectedRunId) { runIdStatus = 'matched';    runIdScore = 1.0; }
    else                     { runIdStatus = 'mismatched'; runIdScore = 0.0; }
  }

  // Schema score (0–1)
  const schemaSig = schemaResult ? schemaResult.schemaScore / 100 : 0.5;

  // Self-reported confidence bonus/penalty
  const confSig = (confidence != null) ? confidence : 0.75;

  // Weighted composite
  const weights = { coverage: 0.45, schema: 0.30, runId: 0.15, confidence: 0.10 };
  const composite = clamp(
    coverage   * weights.coverage +
    schemaSig  * weights.schema  +
    runIdScore * weights.runId   +
    confSig    * weights.confidence,
    0, 1
  );

  const status = composite >= 0.72 ? 'verified'
               : composite >= 0.40 ? 'partial'
               :                     'mismatch';

  return {
    status, composite: Math.round(composite * 100) / 100,
    coverage: Math.round(coverage * 100) / 100,
    matched, missing, terms,
    runIdStatus, runId, expectedRunId,
    schemaScore: schemaResult?.schemaScore ?? null,
    confidence,
    errors:   schemaResult?.errors   ?? [],
    warnings: schemaResult?.warnings ?? [],
    checkedAt: now(),
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// OPERATIONAL RISK GATES  — blocking checks before brief generation
// ═══════════════════════════════════════════════════════════════════════════
function checkRiskGates(project, pendingRun) {
  const gates = [];
  const sessions = project.sessions;
  const latest = sessions[sessions.length - 1];

  // HARD BLOCKS
  if (!project.objective || project.objective.trim().length < 15)
    gates.push({ level: 'BLOCK', code: 'NO_OBJECTIVE',
      msg: "This project doesn't have an objective yet. Without one, there's nothing to tell the agent — it won't know what it's working toward.",
      fix: 'Go to the Brief tab and write a 1–2 sentence objective.' });

  if (pendingRun && pendingRun.projectId === project.id)
    gates.push({ level: 'BLOCK', code: 'RUN_PENDING',
      msg: "There's already an active run waiting for a result. Log what the agent returned before starting a new one.",
      fix: 'Scroll down to "Log what the agent returned" and paste the result.' });

  if (latest?.verification?.status === 'mismatch') {
    gates.push({ level: 'BLOCK', code: 'UNRESOLVED_MISMATCH',
      msg: "The last session didn't match what was asked. Sending another brief before resolving this means you might be building on a shaky foundation.",
      fix: 'Review the last session below. Edit it if the agent actually did the work, or acknowledge the mismatch before continuing.' });
  }

  // SOFT WARNINGS
  if (project.constraints.length === 0)
    gates.push({ level: 'WARN', code: 'NO_CONSTRAINTS',
      msg: "No constraints are set. Agents given open-ended briefs tend to go off in unexpected directions.",
      fix: 'Add 2–3 constraints in the Brief tab — things the agent should never do.' });

  if (sessions.length > 5 && project.handoffs.length === 0)
    gates.push({ level: 'WARN', code: 'NO_HANDOFFS',
      msg: `${sessions.length} sessions in and no handoff packets generated. If you switch tools, you'll lose context.`,
      fix: 'Go to the Handoffs tab and generate a context packet for your next agent.' });

  const staleDays = latest ? (Date.now() - new Date(latest.createdAt).getTime()) / 86400000 : null;
  if (staleDays != null && staleDays > 10)
    gates.push({ level: 'WARN', code: 'STALE',
      msg: `It's been ${Math.round(staleDays)} days since the last session. Things may have changed. Take a moment to re-read the context before sending a new brief.`,
      fix: 'Scan the Overview and last session to make sure the objective still makes sense.' });

  const repeatedMismatches = sessions.filter(s => s.verification?.status === 'mismatch').length;
  if (repeatedMismatches >= 2)
    gates.push({ level: 'WARN', code: 'DRIFT',
      msg: `${repeatedMismatches} sessions came back without matching what was asked. The agent may be interpreting instructions differently than expected.`,
      fix: 'Try being more literal in your instructions. Describe the exact output you expect, not just the goal.' });

  return gates;
}

// ═══════════════════════════════════════════════════════════════════════════
// PROJECT HEALTH
// ═══════════════════════════════════════════════════════════════════════════
function projectHealth(p) {
  const sessions = p.sessions, latest = sessions[sessions.length - 1];
  let score = 100; const notes = [];
  if (!p.objective || p.objective.length < 15) { score -= 25; notes.push('No objective'); }
  if (sessions.length === 0)                   { score -= 20; notes.push('No sessions'); }
  if (latest && !latest.nextStep)              { score -= 15; notes.push('Missing next step'); }
  if (p.constraints.length === 0)              { score -= 10; notes.push('No constraints'); }
  const mism = sessions.filter(s => s.verification?.status === 'mismatch').length;
  if (mism > 0) { score -= mism * 8; notes.push(`${mism} mismatch`); }
  const blk = p.tasks.filter(t => t.status === 'blocked').length;
  if (blk > 0) { score -= blk * 5; notes.push(`${blk} blocked`); }
  if (sessions.length > 4 && p.handoffs.length === 0) { score -= 8; notes.push('No handoffs'); }
  const daysSince = latest ? (Date.now()-new Date(latest.createdAt).getTime())/86400000 : 999;
  if (daysSince > 10) { score -= 12; notes.push(`${Math.round(daysSince)}d stale`); }
  const verifiedRatio = sessions.length > 0 ? sessions.filter(s => s.verification?.status === 'verified').length / sessions.length : 0;
  if (verifiedRatio > 0.7) score += 10;
  if (p.decisions.length >= 2) score += 5;
  return { score: clamp(Math.round(score), 0, 100), notes };
}

// ═══════════════════════════════════════════════════════════════════════════
// BRANCHING  — sessions form a tree, not a flat list
// ═══════════════════════════════════════════════════════════════════════════
// Session shape: { id, parentId, branchLabel, ...rest }
// Active branch = path from root to latest session on selected branch

function buildSessionTree(sessions) {
  const byId = Object.fromEntries(sessions.map(s => [s.id, s]));
  const children = {};
  for (const s of sessions) {
    const pid = s.parentId || null;
    if (!children[pid]) children[pid] = [];
    children[pid].push(s);
  }
  return { byId, children };
}

function getActiveBranch(sessions, activeBranchTip) {
  if (!sessions.length) return [];
  const tree = buildSessionTree(sessions);
  // Walk back from tip to root
  const tip = activeBranchTip
    ? sessions.find(s => s.id === activeBranchTip)
    : sessions[sessions.length - 1];
  if (!tip) return sessions; // fallback: flat list
  const path = [];
  let cur = tip;
  while (cur) {
    path.unshift(cur);
    cur = cur.parentId ? tree.byId[cur.parentId] : null;
  }
  return path;
}

function getBranchTips(sessions) {
  // A tip is a session with no children
  const tree = buildSessionTree(sessions);
  return sessions.filter(s => !(tree.children[s.id]?.length > 0));
}

// ═══════════════════════════════════════════════════════════════════════════
// HANDOFF BUILDER
// ═══════════════════════════════════════════════════════════════════════════
function buildHandoff(project, targetTool, branchSessions) {
  const latest = branchSessions[branchSessions.length - 1];
  return {
    id: genId(),
    targetTool,
    schema_version: '2.0',
    project: {
      title:       project.title,
      objective:   project.objective,
      coreBrief:   project.coreBrief,
      currentPhase:project.currentPhase,
      constraints: project.constraints,
    },
    context: {
      currentState:    latest?.outputSummary || 'No sessions yet.',
      recentDecisions: project.decisions.slice(-4).map(d => ({ title: d.title, rationale: d.rationale })),
      relevantAssets:  project.assets.slice(-3).map(a => ({ name: a.name, type: a.type })),
      sessionCount:    project.sessions.length,
    },
    instruction: {
      exactNext:       latest?.nextStep || 'Define the next step.',
      constraints:     project.constraints,
    },
    sessionTemplate: {
      _comment: 'Fill this out and paste it back into ThreadOS → Agent tab → Log Result',
      runId:          null,
      tool:           targetTool,
      outputSummary:  '',
      changesMade:    '',
      nextStep:       '',
      producedAssets: [],
      confidence:     null,
    },
    generatedAt: now(),
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// AI LAYER  (all calls go through callClaude — never expose key elsewhere)
// ═══════════════════════════════════════════════════════════════════════════
class ApiKeyError extends Error { constructor(msg='Add your Anthropic API key in Settings.') { super(msg); this.code='NO_KEY'; } }

async function callClaude(apiKey, system, user, maxTokens=800) {
  if (!apiKey) throw new ApiKeyError();
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: AI_MODEL, max_tokens: maxTokens, system, messages: [{ role:'user', content:user }] }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API error');
  return data.content?.[0]?.text || '';
}

function parseAIJson(raw) {
  const clean = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
  return JSON.parse(clean);
}

const AI = {
  async fillBrief(key, title, context) {
    const s = 'You are a project strategist. Respond ONLY with valid JSON, no markdown.';
    const u = `Project: "${title}"\nContext: ${context||'none'}\n\nReturn: {"objective":"1-2 sentence goal","coreBrief":"3-4 sentence background","constraints":["c1","c2","c3"],"currentPhase":"phase name","toolStack":["Tool1"]}`;
    return parseAIJson(await callClaude(key, s, u, 500));
  },
  async analyzeRisks(key, project, branchSessions) {
    const s = 'You are a project health analyst for AI workflows. Respond ONLY with a JSON array, no markdown.';
    const sessions = branchSessions.slice(-3).map(s => `[${s.tool}] ${s.outputSummary} → ${s.nextStep||'?'} (${s.verification?.status})`).join('\n');
    const u = `Project: "${project.title}"\nObjective: ${project.objective||'unset'}\nRecent sessions:\n${sessions||'none'}\n\nReturn max 4 risks:\n[{"type":"slug","message":"specific message","severity":"high|medium|low","recommendation":"action"}]`;
    const flags = parseAIJson(await callClaude(key, s, u, 600));
    return flags.map(f => ({...f, id:genId(), createdAt:now(), source:'ai'}));
  },
  async suggestNext(key, project, branchSessions) {
    const s = 'You are an AI workflow coordinator. Reply with ONE concise instruction, plain text only.';
    const latest = branchSessions[branchSessions.length - 1];
    const u = `Project: "${project.title}"\nObjective: ${project.objective}\nPhase: ${project.currentPhase||'?'}\nConstraints: ${project.constraints.join('; ')||'none'}\nLast output: ${latest?.outputSummary||'none'}\nLast next step: ${latest?.nextStep||'none'}\n\nBest next instruction:`;
    return (await callClaude(key, s, u, 200)).trim();
  },
  async critiqueInstruction(key, instruction, project) {
    const s = 'You are a quality reviewer for AI agent instructions. Respond ONLY with valid JSON.';
    const u = `Instruction: "${instruction}"\nConstraints: ${project.constraints.join('; ')||'none'}\nObjective: ${project.objective||'unset'}\n\nReturn: {"score":0-100,"issues":["issue"],"improved":"better version","verdict":"one sentence"}`;
    return parseAIJson(await callClaude(key, s, u, 450));
  },
  async fillSession(key, project, prompt, partial) {
    const s = 'You are an AI workflow logger. Respond ONLY with valid JSON.';
    const u = `Project: "${project.title}"\nObjective: ${project.objective||'?'}\nTool: ${partial.tool||'?'}\nPrompt: ${prompt||'(none)'}\n\nFill missing:\n{"outputSummary":"what was accomplished","changesMade":"what changed","nextStep":"specific next instruction","confidence":0.0-1.0}`;
    return parseAIJson(await callClaude(key, s, u, 350));
  },
};

// ═══════════════════════════════════════════════════════════════════════════
// SHARE LINKS  (project encoded in URL hash, UTF-8 safe)
// ═══════════════════════════════════════════════════════════════════════════
function shareEncode(project) {
  try {
    const payload = { v:4, p:{ title:project.title, objective:project.objective, status:project.status, coreBrief:project.coreBrief, constraints:project.constraints, toolStack:project.toolStack, currentPhase:project.currentPhase, decisions:project.decisions, sessions:project.sessions.map(s=>({...s})), assets:project.assets.map(a=>({...a,content:(a.content||'').slice(0,600)})), tasks:project.tasks, handoffs:[], notes:project.notes, createdAt:project.createdAt } };
    const bytes = new TextEncoder().encode(JSON.stringify(payload));
    let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
  } catch { return null; }
}
function shareDecode(enc) {
  try {
    const bin = atob(enc); const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const p = JSON.parse(new TextDecoder().decode(bytes));
    return p?.v===4 ? p.p : null;
  } catch { return null; }
}
function getIncomingShare() {
  if (!location.hash.startsWith('#share=')) return null;
  return shareDecode(location.hash.slice(7));
}

// STORE
// ═══════════════════════════════════════════════════════════════════════════
const StoreCtx = createContext(null);
const useStore = () => useContext(StoreCtx);

function useAppStore() {
  const [projects, setProjects] = useState(() => {
    const p = Storage.get(K.projects);
    if (p && Array.isArray(p) && p.length) return p;
    const seed = makeSeed(); Storage.set(K.projects, seed); return seed;
  });
  const [activeId,  setActiveId]  = useState(() => Storage.get(K.projects)?.[0]?.id || null);
  const [pendingRun,setPendingRun] = useState(() => Storage.get(K.run));
  const [apiKey,    setApiKeyState]= useState(() => localStorage.getItem(K.apiKey) || '');
  const [accent,    setAccentState]= useState(() => localStorage.getItem(K.accent) || '#f97316');
  const [toasts,    setToasts]     = useState([]);
  const [loopState, setLoopState]  = useState(() => Storage.get(K.run) ? LOOP.BRIEFED : LOOP.IDLE);

  // Persist
  useEffect(() => { Storage.set(K.projects, projects); }, [projects]);
  useEffect(() => {
    if (pendingRun) Storage.set(K.run, pendingRun);
    else Storage.remove(K.run);
  }, [pendingRun]);

  const toast = useCallback((msg, type='info', dur=3500) => {
    const id = genId();
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), dur);
  }, []);

  const dismissToast = useCallback(id => setToasts(p => p.filter(t => t.id !== id)), []);

  const mutate = useCallback(fn => setProjects(fn), []);

  const active = useMemo(() => projects.find(p => p.id === activeId) || null, [projects, activeId]);

  const activeBranch = useMemo(() => {
    if (!active) return [];
    return getActiveBranch(active.sessions, active.activeBranchTip);
  }, [active]);

  // ── API key (stored plaintext in localStorage — acceptable for BYOK/internal)
  const saveApiKey = useCallback(k => {
    const key = k.trim();
    localStorage.setItem(K.apiKey, key);
    setApiKeyState(key);
    toast('API key saved');
    return key;
  }, [toast]);

  const setAccent = useCallback(c => {
    localStorage.setItem(K.accent, c);
    setAccentState(c);
  }, []);

  // ── Projects
  const createProject = useCallback(({ title, objective='', toolStack=[], status='active' }) => {
    const p = { id:genId(), title:title.trim(), objective, status, coreBrief:'', constraints:[], toolStack, currentPhase:'', notes:'', decisions:[], sessions:[], assets:[], handoffs:[], tasks:[], activeBranchTip:null, createdAt:now(), updatedAt:now() };
    setProjects(prev => [p, ...prev]);
    setActiveId(p.id);
    return p;
  }, []);

  const updateProject = useCallback((id, changes) => {
    mutate(ps => ps.map(p => p.id === id ? touch({...p, ...changes}) : p));
  }, [mutate]);

  const deleteProject = useCallback(id => {
    mutate(ps => ps.filter(p => p.id !== id));
    setActiveId(prev => prev === id ? (projects.find(p => p.id !== id)?.id || null) : prev);
  }, [mutate, projects]);

  const cloneProject = useCallback(id => {
    const src = projects.find(p => p.id === id); if (!src) return;
    const clone = {...src, id:genId(), title:`${src.title} (copy)`, sessions:[], handoffs:[], activeBranchTip:null, createdAt:now(), updatedAt:now()};
    setProjects(prev => [clone, ...prev]); setActiveId(clone.id);
    toast('Project cloned');
  }, [projects, toast]);

  const exportProject = useCallback(id => {
    const p = projects.find(x => x.id === id); if (!p) return;
    const blob = new Blob([JSON.stringify({projects:[p],exportedAt:now()},null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${p.title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); toast('Exported');
  }, [projects, toast]);

  // ── Sessions (branch-aware)
  const addSession = useCallback((projectId, data, parentId=null) => {
    mutate(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      const sess = {
        id: genId(),
        parentId: parentId ?? p.activeBranchTip ?? null,
        tool: data.tool || 'Unknown',
        prompt: data.prompt || '',
        outputSummary: data.outputSummary || '',
        producedAssets: data.producedAssets || [],
        changesMade: data.changesMade || '',
        nextStep: data.nextStep || '',
        confidence: data.confidence ?? null,
        createdAt: data.createdAt || now(),
        verification: data.verification || { status:'unverified' },
      };
      const updated = {...p, sessions:[...p.sessions, sess], activeBranchTip:sess.id};
      return touch(updated);
    }));
  }, [mutate]);

  const updateSession = useCallback((projectId, sessionId, changes) => {
    mutate(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return touch({...p, sessions: p.sessions.map(s => s.id === sessionId ? {...s,...changes} : s)});
    }));
  }, [mutate]);

  const deleteSession = useCallback((projectId, sessionId) => {
    mutate(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      const remaining = p.sessions.filter(s => s.id !== sessionId);
      const tip = remaining[remaining.length-1]?.id || null;
      return touch({...p, sessions:remaining, activeBranchTip:tip});
    }));
  }, [mutate]);

  const branchFrom = useCallback((projectId, sessionId) => {
    // Set the active branch tip to sessionId — next session will branch from here
    mutate(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return {...p, activeBranchTip: sessionId};
    }));
    toast('Branch point set — next session branches from here');
  }, [mutate, toast]);

  // ── Decisions / Assets / Tasks / Handoffs (unchanged from v3)
  const addDecision = useCallback((pid,d) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,decisions:[{id:genId(),...d,createdAt:now()},...p.decisions]}))), [mutate]);
  const deleteDecision = useCallback((pid,id) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,decisions:p.decisions.filter(d=>d.id!==id)}))), [mutate]);
  const addAsset = useCallback((pid,a) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,assets:[{id:genId(),...a,createdAt:now()},...p.assets]}))), [mutate]);
  const updateAsset = useCallback((pid,aid,ch) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,assets:p.assets.map(a=>a.id===aid?{...a,...ch}:a)}))), [mutate]);
  const deleteAsset = useCallback((pid,aid) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,assets:p.assets.filter(a=>a.id!==aid)}))), [mutate]);
  const addTask = useCallback((pid,t) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,tasks:[...p.tasks,{id:genId(),...t,createdAt:now()}]}))), [mutate]);
  const updateTask = useCallback((pid,tid,ch) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,tasks:p.tasks.map(t=>t.id===tid?{...t,...ch}:t)}))), [mutate]);
  const deleteTask = useCallback((pid,tid) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,tasks:p.tasks.filter(t=>t.id!==tid)}))), [mutate]);
  const addHandoff = useCallback((pid,h) => mutate(ps => ps.map(p => p.id!==pid?p:touch({...p,handoffs:[...p.handoffs,h]}))), [mutate]);

  // ── Core loop — deterministic generate → verify → log
  const generateBrief = useCallback((projectId, instruction, targetTool) => {
    const project = projects.find(p => p.id === projectId);
    if (!project) return null;

    const gates = checkRiskGates(project, pendingRun);
    const blockers = gates.filter(g => g.level === 'BLOCK');
    if (blockers.length > 0) {
      toast(`Blocked: ${blockers[0].msg}`, 'error', 5000);
      return null;
    }

    const branch = getActiveBranch(project.sessions, project.activeBranchTip);
    const latest = branch[branch.length - 1];
    const brief = {
      schema_version: '2.0',
      runId: `run_${Date.now().toString(36)}_${genId().slice(0,4)}`,
      projectId,
      project: {
        title:       project.title,
        objective:   project.objective,
        coreBrief:   project.coreBrief,
        currentPhase:project.currentPhase,
        constraints: project.constraints,
        toolStack:   project.toolStack,
        decisions:   project.decisions.slice(-5),
        latestSession: latest ? { tool:latest.tool, outputSummary:latest.outputSummary } : null,
      },
      instruction,
      targetTool,
      sessionTemplate: {
        _comment: 'Fill and paste into ThreadOS → Agent tab → Log Result',
        runId:          null,  // <-- fill with the runId above
        tool:           targetTool,
        outputSummary:  '',    // required, min 20 chars
        changesMade:    '',    // required, min 10 chars
        nextStep:       '',    // required, min 10 chars
        producedAssets: [],    // array of filenames
        confidence:     null,  // 0.0–1.0
        decisions:      [],
        tasks:          [],
      },
      generatedAt: now(),
    };

    const run = { runId:brief.runId, projectId, instruction, targetTool, generatedAt:brief.generatedAt };
    setPendingRun(run);
    setLoopState(LOOP.BRIEFED);
    return brief;
  }, [projects, pendingRun, toast]);

  const logResult = useCallback((projectId, rawData) => {
    const project = projects.find(p => p.id === projectId);
    if (!project) return null;

    // Normalise keys (agents may use snake_case)
    const data = {
      runId:          rawData.runId || rawData.run_id || null,
      tool:           rawData.tool || 'Unknown',
      prompt:         rawData.prompt || pendingRun?.instruction || '',
      outputSummary:  rawData.outputSummary || rawData.output_summary || rawData.output || '',
      changesMade:    rawData.changesMade || rawData.changes_made || rawData.changes || '',
      nextStep:       rawData.nextStep || rawData.next_step || '',
      producedAssets: Array.isArray(rawData.producedAssets) ? rawData.producedAssets
                    : rawData.producedAssets ? [rawData.producedAssets]
                    : rawData.produced_assets ? [rawData.produced_assets] : [],
      confidence:     rawData.confidence != null ? Number(rawData.confidence) : null,
      decisions:      rawData.decisions || [],
      tasks:          rawData.tasks || [],
      createdAt:      rawData.createdAt || now(),
    };

    // Schema validation
    const schemaResult = validateSchema(data);

    // Diff + composite verification
    const currentRun = pendingRun?.projectId === projectId ? pendingRun : null;
    const verification = verifyResult({
      instruction:  data.prompt || currentRun?.instruction || '',
      outputSummary: data.outputSummary,
      schemaResult,
      confidence:   data.confidence,
      runId:        data.runId,
      expectedRunId:currentRun?.runId || null,
    });

    // Merge inline decisions/tasks from agent response
    mutate(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      let updated = {...p};
      data.decisions.forEach(d => {
        if (d.title) updated = {...updated, decisions:[{id:genId(),title:d.title,rationale:d.rationale||'',impact:d.impact||'',createdAt:now()},...updated.decisions]};
      });
      data.tasks.forEach(t => {
        if (t.title) updated = {...updated, tasks:[...updated.tasks,{id:genId(),title:t.title,status:t.status||'todo',owner:t.owner||'',notes:t.notes||'',createdAt:now()}]};
      });
      return updated;
    }));

    addSession(projectId, { ...data, verification }, project.activeBranchTip);

    setPendingRun(null);
    const newState = verification.status === 'verified' ? LOOP.VERIFIED
                   : verification.status === 'mismatch' ? LOOP.FAILED
                   :                                       LOOP.VERIFIED; // partial also passes
    setLoopState(newState);

    const labels = { verified:'✓ Verified', partial:'⚠ Partial match — review warnings', mismatch:'✗ Mismatch — check agent output' };
    const types  = { verified:'info', partial:'warn', mismatch:'error' };
    toast(labels[verification.status] || 'Logged', types[verification.status] || 'info');

    setTimeout(() => setLoopState(LOOP.IDLE), 3000);
    return verification;
  }, [projects, pendingRun, mutate, addSession, toast]);

  // ── Import / Export
  const exportAll = useCallback(() => {
    const blob = new Blob([JSON.stringify({projects,exportedAt:now()},null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `threadOS_export_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); toast('Exported');
  }, [projects, toast]);

  const importAll = useCallback(raw => {
    try {
      const data = JSON.parse(raw);
      const incoming = Array.isArray(data) ? data : (data.projects || []);
      if (!incoming.length) throw new Error('No projects found');
      const existingIds = new Set(projects.map(p => p.id));
      const newOnes = incoming.filter(p => !existingIds.has(p.id)).map(p => ({...p, id:p.id||genId()}));
      setProjects(prev => [...prev, ...newOnes]);
      toast(`Imported ${newOnes.length} project(s)`);
    } catch(e) { toast(`Import failed: ${e.message}`, 'error'); }
  }, [projects, toast]);

  return {
    projects, active, activeId, setActiveId, activeBranch,
    pendingRun, generateBrief, logResult, loopState,
    apiKey, saveApiKey, accent, setAccent,
    toasts, toast, dismissToast,
    createProject, updateProject, deleteProject, cloneProject, exportProject,
    addSession, updateSession, deleteSession, branchFrom,
    addDecision, deleteDecision,
    addAsset, updateAsset, deleteAsset,
    addTask, updateTask, deleteTask,
    addHandoff,
    exportAll, importAll,
  };
}

// SHARED COMPONENTS

function Spinner({size=12,color}) {
  const{accent}=useStore();
  return <span style={{width:size,height:size,border:`2px solid ${C.border2}`,borderTopColor:color||accent,borderRadius:'50%',animation:'spin .7s linear infinite',display:'inline-block',flexShrink:0}}/>;
}

function AiBtn({onClick,loading,label='AI',disabled=false}) {
  const{accent}=useStore();
  return(
    <button
      style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:5,fontSize:11,fontWeight:600,background:`${accent}18`,color:accent,border:`1px solid ${accent}30`,cursor:disabled||loading?'default':'pointer',opacity:disabled||loading?.6:1,...MONO}}
      onClick={disabled||loading?undefined:onClick}
      disabled={disabled||loading}
    >
      {loading?<Spinner size={10}/>:<I.Spark size={11}/>}
      {label}
    </button>
  );
}

function VBadge({v,large=false}) {
  if(!v||v.status==='unverified') return <span style={{fontSize:10,color:C.faint,...MONO}}>—</span>;
  const cfg = {
    verified:{ bg:`${C.green}15`, border:`${C.green}30`, c:C.green, label:large?`✓ Delivered (${Math.round((v.composite||0)*100)}%)`:`✓ ${Math.round((v.composite||0)*100)}%` },
    partial: { bg:`${C.yellow}15`, border:`${C.yellow}30`, c:C.yellow, label:large?`⚠ Partially done (${Math.round((v.composite||0)*100)}%)`:`⚠ ${Math.round((v.composite||0)*100)}%` },
    mismatch:{ bg:`${C.red}15`, border:`${C.red}30`, c:C.red, label:large?`✗ Needs review (${Math.round((v.composite||0)*100)}%)`:`✗ ${Math.round((v.composite||0)*100)}%` },
  };
  const s = cfg[v.status]; if(!s) return null;
  return(
    <span style={{display:'inline-flex',alignItems:'center',padding:large?'4px 10px':'2px 7px',borderRadius:4,fontSize:large?12:10,fontWeight:700,...MONO,background:s.bg,border:`1px solid ${s.border}`,color:s.c}}>
      {s.label}
    </span>
  );
}

function HealthDot({score}) {
  const c = score>=75?C.green:score>=50?C.yellow:C.red;
  return <span style={{width:7,height:7,borderRadius:'50%',background:c,flexShrink:0,display:'inline-block'}}/>;
}

function Modal({title,subtitle,onClose,children,wide=false,maxWidth}) {
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);},[onClose]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(0,0,0,.8)',backdropFilter:'blur(8px)'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.surface,border:`1px solid ${C.border2}`,borderRadius:12,width:'100%',maxWidth:maxWidth||wide?600:460,boxShadow:'0 40px 80px rgba(0,0,0,.7)',animation:'fadeUp .18s ease-out',maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'16px 20px',borderBottom:`1px solid ${C.border}`,flexShrink:0,gap:12}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>{title}</div>
            {subtitle&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{subtitle}</div>}
          </div>
          <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.muted,padding:2,flexShrink:0,marginTop:1}} onClick={onClose}><I.X size={14}/></button>
        </div>
        <div style={{padding:20,overflowY:'auto',flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function Field({label,children,hint,action}) {
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <label style={S.label}>{label}</label>
        {action}
      </div>
      {children}
      {hint&&<div style={{fontSize:10,color:C.muted,marginTop:4,...MONO}}>{hint}</div>}
    </div>
  );
}

function InfoBox({type='info',children}) {
  const{accent}=useStore();
  const cfg = {
    info:  { bg:`${C.blue}0a`,   border:`${C.blue}25`,   c:'#93c5fd', Icon:I.Info  },
    warn:  { bg:`${C.yellow}0a`, border:`${C.yellow}25`, c:C.yellow,  Icon:I.Alert },
    error: { bg:`${C.red}0a`,    border:`${C.red}25`,    c:'#fca5a5', Icon:I.Alert },
    ai:    { bg:`${accent}0a`,   border:`${accent}25`,   c:accent,    Icon:I.Spark },
  };
  const s = cfg[type]||cfg.info;
  return(
    <div style={{background:s.bg,border:`1px solid ${s.border}`,borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'flex-start',gap:10,fontSize:12,color:s.c,lineHeight:1.6}}>
      <s.Icon sz={13} c={s.c} style={{flexShrink:0,marginTop:1}}/>

    </div>

}

function Empty({icon,title,body,action}) {
  return(
    <div style={{textAlign:'center',padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
      <div style={{width:44,height:44,background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',color:C.faint}}>{icon}</div>
      <div style={{fontSize:13,fontWeight:600,color:C.faint}}>{title}</div>
      {body&&<div style={{fontSize:12,color:C.faint,maxWidth:280,lineHeight:1.5}}>{body}</div>}
      {action&&<div style={{marginTop:4}}>{action}</div>}
    </div>
  );
}

function GateWall({gates,onAcknowledge}) {
  const{accent}=useStore();
  const blockers = gates.filter(g=>g.level==='BLOCK');
  const warnings = gates.filter(g=>g.level==='WARN');
  return(
    <div style={{background:C.card,border:`1px solid ${C.red}30`,borderRadius:10,padding:'16px',marginBottom:16,animation:'gate .25s ease-out'}}>
      {blockers.length>0&&<>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <I.Shield sz={15} c={C.red}/>
          <span style={{fontSize:13,fontWeight:700,color:C.red}}>Heads up — there's something to resolve first</span>
        </div>
        {blockers.map(g=>(
          <div key={g.code} style={{background:`${C.red}0a`,border:`1px solid ${C.red}20`,borderRadius:7,padding:'12px 14px',marginBottom:8}}>
            <div style={{fontSize:13,color:C.text,marginBottom:6,lineHeight:1.6}}>{g.msg}</div>
            <div style={{fontSize:12,color:'#fca5a5',display:'flex',gap:6,alignItems:'flex-start'}}>
              <span style={{flexShrink:0,marginTop:1}}>→</span><span>{g.fix}</span>
            </div>
          </div>
        ))}
      </>}
      {warnings.length>0&&<>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,marginTop:blockers.length?12:0}}>
          <I.Alert sz={13} c={C.yellow}/>
          <span style={{fontSize:12,fontWeight:600,color:C.yellow}}>A few things worth knowing ({warnings.length})</span>
        </div>
        {warnings.map(g=>(
          <div key={g.code} style={{fontSize:12,color:C.muted,marginBottom:5,display:'flex',gap:8}}>
            <span style={{color:C.yellow,flexShrink:0}}>⚠</span><span>{g.msg}</span>
          </div>
        ))}
        {blockers.length===0&&<button style={{...S.btnG,fontSize:12,marginTop:10}} onClick={onAcknowledge}>I've read these — continue anyway</button>}
      </>}
    </div>
  );
}

// VERIFICATION DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════════════
function VerifyPanel({v,onClose}) {
  if(!v) return null;
  const signals = [
    {label:'Did it follow instructions?', val:v.coverage!=null?`${Math.round(v.coverage*100)}%`:'—', note:v.matched?.length>0?`Covered: ${v.matched.slice(0,4).join(', ')}${v.matched.length>4?' +more':''}`:v.missing?.length>0?`Missed: ${v.missing.slice(0,3).join(', ')}`:'Nothing specific to check'},
    {label:'Was the output well-formed?',  val:v.schemaScore!=null?`${v.schemaScore}/100`:'—', note:v.errors?.length?v.errors[0]:'Required fields were all present'},
    {label:'Did the agent cite this run?', val:v.runIdStatus==='matched'?'Yes ✓':v.runIdStatus==='mismatched'?'Wrong run':v.runIdStatus==='missing'?'Not cited':'N/A', note:v.runId?`Run: ${v.runId.slice(0,20)}…`:'No active run to match against'},
    {label:'How confident was the agent?', val:v.confidence!=null?`${Math.round(v.confidence*100)}%`:'Not reported', note:v.confidence!=null?(v.confidence>=0.8?'Agent reported high confidence':v.confidence>=0.6?'Agent reported moderate confidence':'Agent flagged uncertainty'):'Agent did not report confidence — consider asking'},
  ];
  return(
    <Modal title="Verification Detail" subtitle={`Match score: ${Math.round((v.composite||0)*100)}%`} onClose={onClose} wide>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:C.card,borderRadius:8,marginBottom:16}}>
        <VBadge v={v} large/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text}}>
            {v.status==='verified'?'The agent did what you asked.'
             :v.status==='partial'?'The agent partially completed the task — check what was missed.'
             :"The output doesn't match what was asked. Review before moving on."}
          </div>
          <div style={{fontSize:11,color:C.muted,...MONO,marginTop:2}}>checked {v.checkedAt?fmtAgo(v.checkedAt):''}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
        {signals.map(sig=>(
          <div key={sig.label} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:7,padding:'10px 12px'}}>
            <div style={{fontSize:10,...MONO,color:C.muted,textTransform:'uppercase',marginBottom:4}}>{sig.label}</div>
            <div style={{fontSize:18,fontWeight:700,color:C.text,...MONO,marginBottom:3}}>{sig.val}</div>
            <div style={{fontSize:10,color:C.faint,lineHeight:1.4}}>{sig.note}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:v.warnings?.length?12:0}}>
        <div style={{background:`${C.green}08`,border:`1px solid ${C.green}20`,borderRadius:7,padding:10}}>
          <div style={{fontSize:10,...MONO,color:C.green,marginBottom:6}}>Instructions the agent covered</div>
          {v.matched?.length>0?v.matched.map(t=><div key={t} style={{fontSize:11,color:C.green,marginBottom:2}}>✓ {t}</div>):<div style={{fontSize:11,color:C.faint}}>none</div>}
        </div>
        <div style={{background:`${C.red}08`,border:`1px solid ${C.red}20`,borderRadius:7,padding:10}}>
          <div style={{fontSize:10,...MONO,color:C.red,marginBottom:6}}>Things that weren't addressed</div>
          {v.missing?.length>0?v.missing.map(t=><div key={t} style={{fontSize:11,color:C.red,marginBottom:2}}>✗ {t}</div>):<div style={{fontSize:11,color:C.faint}}>none</div>}
        </div>
      </div>
      {v.errors?.length>0&&<InfoBox type="error"><strong>Schema errors:</strong> {v.errors.join(' · ')}</InfoBox>}
      {v.warnings?.length>0&&<InfoBox type="warn"><strong>Warnings:</strong> {v.warnings.join(' · ')}</InfoBox>}
    </Modal>
  );
}

// SESSION FORM
// ═══════════════════════════════════════════════════════════════════════════
function SessForm({initial,project,onSave,onCancel}) {
  const{apiKey,toast,accent}=useStore();
  const[f,setF]=useState({
    tool:initial?.tool||'',prompt:initial?.prompt||'',
    outputSummary:initial?.outputSummary||'',
    producedAssets:Array.isArray(initial?.producedAssets)?initial.producedAssets.join(', '):(initial?.producedAssets||''),
    changesMade:initial?.changesMade||'',nextStep:initial?.nextStep||'',
    confidence:initial?.confidence!=null?String(initial.confidence):'',
    createdAt:initial?.createdAt||'',
  });
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const[filling,setFilling]=useState(false);

  const runFill=async()=>{
    setFilling(true);
    try{
      const r=await AI.fillSession(apiKey,project,f.prompt,f);
      setF(p=>({...p,outputSummary:r.outputSummary||p.outputSummary,changesMade:r.changesMade||p.changesMade,nextStep:r.nextStep||p.nextStep,confidence:r.confidence!=null?String(r.confidence):p.confidence}));
      toast('Fields filled — review before saving');
    }catch(e){toast(e.code==='NO_KEY'?'Add API key in Settings':e.message,'error');}
    setFilling(false);
  };

  const save=()=>{
    if(!f.outputSummary.trim()){toast('Add a description of what the agent did','warn');return;}
    const assets=f.producedAssets.split(',').map(s=>s.trim()).filter(Boolean);
    const conf=f.confidence!==''?Number(f.confidence):null;
    onSave({...f,producedAssets:assets,confidence:isNaN(conf)?null:conf});
  };

  return(
    <div>
      <Field label="Which tool ran this?" hint="Claude, ChatGPT, Cursor, Tasklet…"><input style={S.input} placeholder="e.g. Claude" value={f.tool} onChange={e=>set('tool',e.target.value)}/></Field>
      <Field label="What did you ask it to do?"><textarea style={{...S.textarea,height:60}} value={f.prompt} onChange={e=>set('prompt',e.target.value)} placeholder="The instruction you gave the agent — copy it in if you have it…"/></Field>
      <Field label="What did it actually do?" action={<AiBtn onClick={runFill} loading={filling} label="Help me write this"/>}>
        <textarea style={{...S.textarea,height:88}} value={f.outputSummary} onChange={e=>set('outputSummary',e.target.value)} placeholder="Describe what the agent accomplished. Be specific — this is what gets verified against your instruction."/>
      </Field>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="What changed?"><input style={S.input} value={f.changesMade} onChange={e=>set('changesMade',e.target.value)} placeholder="Files created, decisions made, problems solved…"/></Field>
        <Field label="Files or outputs created"><input style={S.input} value={f.producedAssets} onChange={e=>set('producedAssets',e.target.value)} placeholder="architecture.md, webhook-handler.ts (comma-separated)"/></Field>
      </div>
      <Field label="What's the next thing to do?" hint="Write this like a direct instruction — it becomes the default for your next agent run.">
        <input style={S.input} value={f.nextStep} onChange={e=>set('nextStep',e.target.value)} placeholder="e.g. Reindex Pinecone embeddings using text-embedding-3-large and verify latency under 2 seconds"/>
      </Field>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="How confident did the agent seem?" hint="0 = very uncertain, 1 = fully confident. Leave blank if the agent didn't say."><input style={S.input} type="number" min="0" max="1" step="0.01" value={f.confidence} onChange={e=>set('confidence',e.target.value)} placeholder="0.0 – 1.0"/></Field>
        <Field label="When did this happen?" hint="Leave blank to use right now."><input type="datetime-local" style={{...S.input,colorScheme:'dark'}} value={f.createdAt?new Date(f.createdAt).toISOString().slice(0,16):''} onChange={e=>set('createdAt',e.target.value?new Date(e.target.value).toISOString():'')}/></Field>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
        <button style={S.btnS} onClick={onCancel}>Cancel</button>
        <button style={{...S.btnP,opacity:f.outputSummary.trim()?1:.5}} onClick={save}>Save Session</button>
      </div>
    </div>
  );
}

        <button style={{...S.btnP,minWidth:80}} onClick={handleSave}>{saved?'✓ Saved':'Save Key'}</button>
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16,marginBottom:16}}>
        <label style={S.label}>Accent color</label>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
          {ACCENTS.map(col=>(
            <button key={col} onClick={()=>setAccent(col)} style={{width:28,height:28,borderRadius:7,background:col,border:`2px solid ${accent===col?'white':'transparent'}`,cursor:'pointer',transition:'border-color .12s'}}/>
          ))}
        </div>
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        <label style={S.label}>What the API key unlocks</label>
        {[['Brief','Fills in the objective, constraints, and tool stack from a description'],
          ['Sessions','Writes the output summary and next step based on what you gave the agent'],
          ['Agent','Suggests what to do next · Scores your instruction before you send it'],
          ['Health','Reads your session history and flags specific things to watch'],

          <div key={tab} style={{display:'flex',gap:8,padding:'6px 0',borderBottom:`1px solid ${C.border}`,alignItems:'flex-start'}}>

          </div>
        ))}
      </div>
    </Modal>
  );
}

function ProjectItem({proj,active,pending,onClick,onClone,onExport,onRename,onDelete,onArchive}) {

  const[title,setTitle]=useState(proj.title);
  const[menu,setMenu]=useState(false);
  const{score,notes}=projectHealth(proj);
  const sc=score>=75?C.green:score>=50?C.yellow:C.red;
  const ref=useRef(null);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  const commit=()=>{if(title.trim()&&title.trim()!==proj.title)onRename(title.trim());else setTitle(proj.title);setEditing(false);};

  return(
    <div style={{position:'relative',marginBottom:1}}>

        onContextMenu={e=>{e.preventDefault();setMenu(v=>!v);}}
        style={{padding:'7px 10px',borderRadius:7,background:active?C.card2:'transparent',border:`1px solid ${active?C.border2:'transparent'}`,cursor:'pointer',transition:'all .1s',display:'flex',alignItems:'center',gap:7}}
      >
        <HealthDot score={score}/>
        <div style={{flex:1,minWidth:0}}>
          {editing
            ?<input ref={ref} style={{...S.input,fontSize:12,padding:'1px 5px',height:'auto'}} value={title} onChange={e=>setTitle(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){setTitle(proj.title);setEditing(false);}}} onClick={e=>e.stopPropagation()}/>
            :<div style={{fontSize:12,fontWeight:active?600:400,color:active?C.text:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{proj.title}</div>
          }
          <div style={{fontSize:9,...MONO,color:C.faint,marginTop:1,display:'flex',gap:3,alignItems:'center'}}>
            <span>{proj.sessions.length}s</span><span>·</span>
            <span>{proj.tasks.filter(t=>t.status!=='done').length}t</span><span>·</span>
            <span style={{color:sc}}>{score}</span>
          </div>
        </div>
        {pending&&<span style={{width:5,height:5,borderRadius:'50%',background:'#fbbf24',animation:'pulse 1.2s infinite',flexShrink:0}}/>}
        <span onClick={e=>{e.stopPropagation();setMenu(v=>!v);}} style={{fontSize:13,color:menu?C.text:C.faint,cursor:'pointer',padding:'0 2px',lineHeight:1,opacity:menu?1:0}} className="proj-menu-btn">⋯</span>
      </div>
      {menu&&<>
        <div style={{position:'fixed',inset:0,zIndex:200}} onClick={()=>setMenu(false)}/>
        <div style={{position:'absolute',left:'calc(100% + 3px)',top:0,zIndex:201,background:C.surface,border:`1px solid ${C.border2}`,borderRadius:8,padding:4,minWidth:148,boxShadow:'0 8px 32px rgba(0,0,0,.6)',animation:'fadeUp .1s ease-out'}}>
          {[['Rename',()=>{setMenu(false);setEditing(true);}],
            ['Clone',()=>{setMenu(false);onClone();}],
            ['Export JSON',()=>{setMenu(false);onExport();}],
            [proj.status==='archived'?'Unarchive':'Archive',()=>{setMenu(false);onArchive();}],
            ['—'],
            ['Delete',()=>{setMenu(false);onDelete();},true],
          ].map(([l,a,danger])=>l==='—'
            ?<div key="sep" style={{height:1,background:C.border,margin:'3px 0'}}/>
            :<button key={l} onClick={a} style={{display:'block',width:'100%',padding:'6px 10px',background:'transparent',border:'none',cursor:'pointer',fontSize:12,color:danger?C.red:C.text,textAlign:'left',borderRadius:5}} onMouseEnter={e=>e.currentTarget.style.background=C.card2} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{l}</button>
          )}
        </div>
      </>}
    </div>
  );
}
