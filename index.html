// CREATE MODAL
// ═══════════════════════════════════════════════════════════════════════════
function CreateModal({onClose}) {
  const{createProject,toast,accent}=useStore();
  const[title,setTitle]=useState('');
  const[obj,setObj]=useState('');
  const submit=()=>{
    if(!title.trim()){toast('Give this project a name first','warn');return;}
    createProject({title:title.trim(),objective:obj.trim()});
    onClose();
  };
  return(
    <Modal title="Start a new project" onClose={onClose}>
      <Field label="Project name" hint="Short and specific — you'll see this in the sidebar."><input style={S.input} autoFocus placeholder="e.g. Support bot, Signal articles, Q3 onboarding…" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></Field>
      <Field label="What's this project trying to do?" hint="Optional here — you can flesh it out in the Brief tab."><textarea style={{...S.textarea,height:72}} placeholder="One or two sentences about the goal. You can always add more detail later." value={obj} onChange={e=>setObj(e.target.value)}/></Field>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:4}}>
        <button style={S.btnS} onClick={onClose}>Cancel</button>
        <button style={{...S.btnP,opacity:title.trim()?1:.5}} onClick={submit}>Create project</button>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// OVERVIEW TAB
// ═══════════════════════════════════════════════════════════════════════════
function OverviewTab({project,activeBranch,onTab}) {
  const{toast,updateProject,accent}=useStore();
  const latest=activeBranch[activeBranch.length-1];
  const{score,notes}=projectHealth(project);
  const sc=score>=75?C.green:score>=50?C.yellow:C.red;
  const done=project.tasks.filter(t=>t.status==='done').length;
  const gates=checkRiskGates(project,null);
  const blocking=gates.filter(g=>g.level==='BLOCK');

  const copyShare=()=>{
    const enc=shareEncode(project);
    if(!enc){toast('This project is too large to share via URL','warn');return;}
    const link=`${location.href.split('#')[0]}#share=${enc}`;
    navigator.clipboard.writeText(link).then(()=>toast('Share link copied to clipboard')).catch(()=>toast("Couldn't copy — try again",'warn'));
  };

  const copyMd=()=>{
    const md=`# ${project.title}\n\n**Objective:** ${project.objective||'—'}\n**Phase:** ${project.currentPhase||'—'}\n**Stack:** ${project.toolStack.join(', ')||'—'}\n\n${project.coreBrief||''}\n\n**Next:** ${latest?.nextStep||'—'}`;
    navigator.clipboard.writeText(md).then(()=>toast('Summary copied'));
  };

  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,gap:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div
            style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4,lineHeight:1.2,cursor:'text',borderRadius:5,padding:'2px 4px',margin:'-2px -4px 2px',display:'inline-block'}}
            title="Double-click to rename"
            onDoubleClick={()=>{const t=prompt('Rename project:',project.title);if(t?.trim()&&t.trim()!==project.title)updateProject(project.id,{title:t.trim()});}}
          >{project.title}</div>
          {project.objective&&<div style={{fontSize:13,color:C.muted,lineHeight:1.55,maxWidth:520}}>{project.objective}</div>}
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button style={S.btnS} onClick={copyMd}><I.Copy sz={12}/>Copy summary</button>
          <button style={S.btnS} onClick={copyShare}><I.Link sz={12}/>Share</button>
          <button style={{...S.btnP}} onClick={()=>onTab('Agent')}><I.Bot sz={13}/>Agent</button>
        </div>
      </div>

      {/* Blocking gates banner */}
      {blocking.length>0&&<div style={{background:`${C.red}0a`,border:`1px solid ${C.red}25`,borderRadius:8,padding:'10px 14px',marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:6,display:'flex',alignItems:'center',gap:6}}><I.Shield sz={12} c={C.red}/>Before you run another agent, sort these out:</div>
        {blocking.map(g=><div key={g.code} style={{fontSize:12,color:C.muted,marginBottom:2}}>→ {g.msg}</div>)}
      </div>}

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:14}}>
        {[
          {lbl:'Project health',val:score,c:sc,sub:notes[0]||'Looking good'},
          {lbl:'Agent runs',val:activeBranch.length,c:C.blue,sub:`${project.sessions.length} total`},
          {lbl:'Tasks done',val:done===0&&project.tasks.length===0?'—':`${done}/${project.tasks.length}`,c:C.green,sub:project.tasks.filter(t=>t.status==='blocked').length?`${project.tasks.filter(t=>t.status==='blocked').length} blocked`:''},
          {lbl:'Key decisions',val:project.decisions.length,c:'#c084fc',sub:''},
          {lbl:'Open issues',val:gates.length||'None',c:blocking.length?C.red:gates.length?C.yellow:C.green,sub:blocking.length?'action needed':''},
        ].map(({lbl,val,c,sub})=>(
          <div key={lbl} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 10px',textAlign:'center'}}>
            <div style={{fontSize:22,fontWeight:800,color:c,lineHeight:1,...MONO}}>{val}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{lbl}</div>
            {sub&&<div style={{fontSize:9,color:C.faint,marginTop:1,...MONO}}>{sub}</div>}
          </div>
        ))}
      </div>

      {/* Latest session */}
      {latest&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:10}}>Last agent run</div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontSize:10,...MONO,fontWeight:600,color:accent,background:`${accent}18`,border:`1px solid ${accent}25`,padding:'1px 7px',borderRadius:4}}>{latest.tool}</span>
          <VBadge v={latest.verification}/>
          {latest.confidence!=null&&<span style={{fontSize:10,...MONO,color:C.faint}}>conf {Math.round(latest.confidence*100)}%</span>}
          <span style={{marginLeft:'auto',fontSize:10,...MONO,color:C.faint}}>{fmtAgo(latest.createdAt)}</span>
        </div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.55,marginBottom:latest.nextStep?10:0}}>{latest.outputSummary}</div>
        {latest.nextStep&&<div style={{background:`${accent}08`,border:`1px solid ${accent}20`,borderRadius:7,padding:'8px 12px',display:'flex',gap:8,fontSize:12,color:C.text}}>
          <span style={{color:accent,flexShrink:0}}>→</span>{latest.nextStep}
        </div>}
      </div>}

      {/* Phase + stack row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        {project.currentPhase&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 14px'}}>
          <div style={{fontSize:9,...MONO,color:C.muted,textTransform:'uppercase',marginBottom:5}}>Phase</div>
          <div style={{fontSize:13,fontWeight:600,color:C.text}}>{project.currentPhase}</div>
        </div>}
        {project.toolStack.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 14px'}}>
          <div style={{fontSize:9,...MONO,color:C.muted,textTransform:'uppercase',marginBottom:7}}>Stack</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {project.toolStack.map(t=><span key={t} style={{fontSize:10,...MONO,fontWeight:600,background:`${accent}15`,color:accent,border:`1px solid ${accent}25`,padding:'1px 7px',borderRadius:4}}>{t}</span>)}
          </div>
        </div>}
      </div>

      {/* Branch summary */}
      {project.sessions.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
        <div style={{fontSize:10,...MONO,color:C.muted,textTransform:'uppercase',marginBottom:8,display:'flex',alignItems:'center',gap:6}}><I.Branch sz={11}/>Progress history</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:3,height:32,marginBottom:6}}>
          {activeBranch.slice(-10).map((s,i,arr)=>{
            const v=s.verification?.status;
            const col=v==='verified'?C.green:v==='mismatch'?C.red:v==='partial'?C.yellow:C.faint;
            const h=Math.max(12,Math.min(32,Math.round((s.outputSummary?.length||0)/12)));
            return<div key={s.id} title={`${s.tool}: ${s.outputSummary?.slice(0,60)||'—'}`} style={{flex:1,background:col,borderRadius:'2px 2px 0 0',height:h,opacity:0.5+(i/arr.length)*0.5,transition:'opacity .2s',cursor:'default'}} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity=String(0.5+(i/arr.length)*0.5)}/>;
          })}
        </div>
        <div style={{fontSize:10,...MONO,color:C.faint,display:'flex',justifyContent:'space-between'}}>
          <span>{activeBranch.length} run{activeBranch.length!==1?'s':''} on this branch</span>
          <span>{getBranchTips(project.sessions).length>1?`${getBranchTips(project.sessions).length} branch paths`:'linear history'}</span>
        </div>
      </div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// BRIEF TAB
// ═══════════════════════════════════════════════════════════════════════════
function BriefTab({project}) {
  const{updateProject,toast,apiKey,accent}=useStore();
  const[f,setF]=useState({title:project.title,objective:project.objective,status:project.status,coreBrief:project.coreBrief,constraints:[...project.constraints],toolStack:[...project.toolStack],currentPhase:project.currentPhase,notes:project.notes||''});
  const[nc,setNc]=useState('');
  const[filling,setFilling]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const save=()=>{updateProject(project.id,f);toast('Brief saved');};
  const fill=async()=>{
    setFilling(true);
    try{
      const r=await AI.fillBrief(apiKey,f.title||project.title,f.coreBrief||f.objective);
      setF(p=>({...p,objective:r.objective||p.objective,coreBrief:r.coreBrief||p.coreBrief,constraints:r.constraints?.length?r.constraints:p.constraints,currentPhase:r.currentPhase||p.currentPhase,toolStack:r.toolStack?.length?r.toolStack:p.toolStack}));
      toast('Brief filled in — read it through, then save');
    }catch(e){toast(e.code==='NO_KEY'?'Add API key in Settings':e.message,'error');}
    setFilling(false);
  };

  const STATUS=['active','paused','complete','archived'];
  const TOOLS=['Tasklet','Claude','ChatGPT','Cursor','Gemini','Copilot','Other'];
  const togTool=t=>setF(p=>({...p,toolStack:p.toolStack.includes(t)?p.toolStack.filter(x=>x!==t):[...p.toolStack,t]}));

  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>What is this project?</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>This brief gets included in every agent run — keep it accurate and agents will always know what they're working on.</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <AiBtn onClick={fill} loading={filling} label="Fill this in for me"/>
          <button style={S.btnP} onClick={save}>Save</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:12,marginBottom:0}}>
        <Field label="Title"><input style={S.input} value={f.title} onChange={e=>set('title',e.target.value)}/></Field>
        <Field label="Status"><select style={{...S.select,width:110}} value={f.status} onChange={e=>set('status',e.target.value)}>{STATUS.map(s=><option key={s}>{s}</option>)}</select></Field>
      </div>
      <Field label="Objective" hint="One or two sentences. What does done look like? Agents use this to stay on track."><textarea style={{...S.textarea,height:64}} value={f.objective} onChange={e=>set('objective',e.target.value)} placeholder="e.g. Build a multi-channel AI support bot that resolves 85%+ of Tier-1 tickets without human escalation."/></Field>
      <Field label="Background & context" hint="Give agents the context they'd need if they were starting fresh. What exists, what matters, what's the history."><textarea style={{...S.textarea,height:88}} value={f.coreBrief} onChange={e=>set('coreBrief',e.target.value)} placeholder="What does the agent need to know about this project before it can do anything useful?"/></Field>
      <Field label="Where are we right now?" hint="A short phase name — agents use this to understand scope."><input style={S.input} value={f.currentPhase} onChange={e=>set('currentPhase',e.target.value)} placeholder="e.g. Backend Integration, QA, Final polish…"/></Field>
      <Field label="Which tools are you using?" hint="Toggle the ones actively in use — this gets shown in every brief.">
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:2}}>
          {TOOLS.map(t=><button key={t} onClick={()=>togTool(t)} style={{padding:'5px 11px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',border:`1px solid ${f.toolStack.includes(t)?accent:C.border2}`,background:f.toolStack.includes(t)?`${accent}15`:C.card2,color:f.toolStack.includes(t)?accent:C.muted,transition:'all .1s'}}>{t}</button>)}
        </div>
      </Field>
      <Field label="What should the agent never do?" hint="These constraints ship in every brief. Be specific — vague constraints get ignored.">
        {f.constraints.map((c,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:5}}>
            <input style={{...S.input,flex:1}} value={c} onChange={e=>setF(p=>({...p,constraints:p.constraints.map((x,j)=>j===i?e.target.value:x)}))}/>
            <button style={{...S.btnS,padding:'7px 9px'}} onClick={()=>setF(p=>({...p,constraints:p.constraints.filter((_,j)=>j!==i)}))}><I.X sz={12}/></button>
          </div>
        ))}
        <div style={{display:'flex',gap:6,marginTop:4}}>
          <input style={{...S.input,flex:1}} placeholder="e.g. Never modify files outside /src, No PII in logs…" value={nc} onChange={e=>setNc(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&nc.trim()){setF(p=>({...p,constraints:[...p.constraints,nc.trim()]}));setNc('');}}}/>
          <button style={S.btnS} onClick={()=>{if(nc.trim()){setF(p=>({...p,constraints:[...p.constraints,nc.trim()]}));setNc('');}}}><I.Plus sz={12}/></button>
        </div>
      </Field>
      <Field label="Notes & open questions" hint="Anything else agents (or future you) should know. Links, open questions, reminders."><textarea style={{...S.textarea,height:64}} value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="Scratch space — links, open questions, things to remember…"/></Field>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SESSIONS TAB (branch-aware)
// ═══════════════════════════════════════════════════════════════════════════
function SessionsTab({project,activeBranch}) {
  const{addSession,updateSession,deleteSession,branchFrom,toast,accent}=useStore();
  const[showAdd,setShowAdd]=useState(false);
  const[editing,setEditing]=useState(null);
  const[diffV,setDiffV]=useState(null);
  const[search,setSearch]=useState('');
  const[showAll,setShowAll]=useState(false);

  const displayed=useMemo(()=>{
    const base=showAll?[...project.sessions].reverse():[...activeBranch].reverse();
    if(!search.trim())return base;
    const q=search.toLowerCase();
    return base.filter(s=>s.outputSummary?.toLowerCase().includes(q)||s.tool?.toLowerCase().includes(q)||s.prompt?.toLowerCase().includes(q)||s.nextStep?.toLowerCase().includes(q));
  },[project.sessions,activeBranch,showAll,search]);

  const branchTips=getBranchTips(project.sessions);
  const isOnBranch=id=>activeBranch.some(s=>s.id===id);

  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Session history</div>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>{activeBranch.length} session{activeBranch.length!==1?'s':''} on this branch{project.sessions.length>activeBranch.length?` · ${project.sessions.length} total`:''}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {project.sessions.length>activeBranch.length&&<button style={{...S.btnS,fontSize:11}} onClick={()=>setShowAll(v=>!v)}>{showAll?'Show active branch only':'Show all sessions'}</button>}
          <button style={S.btnP} onClick={()=>setShowAdd(true)}><I.Plus sz={13}/>Log a session</button>
        </div>
      </div>

      {/* Verification summary */}
      {activeBranch.length>0&&<div style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap'}}>
        {[['verified','Delivered',C.green],['partial','Partial',C.yellow],['mismatch','Needs review',C.red],['unverified','Unverified',C.faint]].map(([status,label,col])=>{
          const n=activeBranch.filter(s=>s.verification?.status===status).length;
          if(!n)return null;
          return<span key={status} style={{fontSize:10,fontWeight:600,background:`${col}12`,color:col,border:`1px solid ${col}25`,padding:'2px 8px',borderRadius:4}}>{n} {label}</span>;
        })}
      </div>}

      {activeBranch.length>2&&<div style={{marginBottom:12}}>
        <input style={{...S.input,fontSize:12}} placeholder="Search sessions…" value={search} onChange={e=>setSearch(e.target.value)}/>
        {search&&<div style={{fontSize:10,...MONO,color:C.faint,marginTop:3}}>{displayed.length} results</div>}
      </div>}

      {displayed.length===0&&<Empty icon={<I.Bot sz={20}/>} title="No sessions" body="Log your first session to start building continuity." action={<button style={S.btnP} onClick={()=>setShowAdd(true)}><I.Plus sz={13}/>Log a session</button>}/>}

      {displayed.map(sess=>{
        const onBranch=isOnBranch(sess.id);
        const isTip=branchTips.some(t=>t.id===sess.id);
        return(
          <div key={sess.id} style={{background:C.card,border:`1px solid ${onBranch?C.border2:C.border}`,borderRadius:10,padding:'12px 14px',marginBottom:8,opacity:onBranch?1:0.65}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
              <span style={{fontSize:9,...MONO,fontWeight:700,color:accent,background:`${accent}18`,border:`1px solid ${accent}25`,padding:'1px 6px',borderRadius:3}}>{sess.tool}</span>
              <button style={{background:'transparent',border:'none',cursor:'pointer',padding:0}} onClick={()=>setDiffV(sess.verification)}><VBadge v={sess.verification}/></button>
              {sess.confidence!=null&&<span style={{fontSize:9,...MONO,color:C.faint}}>conf {Math.round(sess.confidence*100)}%</span>}
              {isTip&&<span style={{fontSize:9,...MONO,color:C.green,background:`${C.green}10`,border:`1px solid ${C.green}20`,padding:'1px 7px',borderRadius:4}}>latest</span>}
              {!onBranch&&<span style={{fontSize:9,...MONO,color:C.faint}}>not on current path</span>}
              <span style={{marginLeft:'auto',fontSize:9,...MONO,color:C.faint}}>{fmtAgo(sess.createdAt)}</span>
              {!isTip&&onBranch&&<button style={{...S.btnS,fontSize:10,padding:'2px 8px',...MONO}} title="Fork the history from this point — useful for trying a different approach" onClick={()=>branchFrom(project.id,sess.id)}><I.Branch sz={10}/>Fork from here</button>}
              <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.faint,padding:3}} onClick={()=>setEditing(sess)}><I.Edit sz={12}/></button>
              <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.faint,padding:3}} onClick={()=>{if(confirm('Delete this session?'))deleteSession(project.id,sess.id);}}><I.Trash sz={12}/></button>
            </div>
            {sess.prompt&&<div style={{fontSize:10,...MONO,color:C.faint,marginBottom:6,background:C.card2,borderRadius:5,padding:'4px 8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sess.prompt.slice(0,130)}</div>}
            <div style={{fontSize:12,color:C.muted,lineHeight:1.55,marginBottom:sess.nextStep?8:0}}>{sess.outputSummary}</div>
            {sess.nextStep&&<div style={{background:`${accent}08`,border:`1px solid ${accent}18`,borderRadius:6,padding:'7px 10px',display:'flex',gap:6,fontSize:12,color:C.text}}>
              <span style={{color:accent,flexShrink:0}}>→</span>{sess.nextStep}
            </div>}
            {sess.producedAssets?.length>0&&<div style={{fontSize:9,...MONO,color:C.faint,marginTop:6}}>📎 {sess.producedAssets.join(' · ')}</div>}
          </div>
        );
      })}

      {showAdd&&<Modal title="What did the agent do?" onClose={()=>setShowAdd(false)} wide><SessForm project={project} onSave={d=>{addSession(project.id,d);setShowAdd(false);toast('Session logged — the work is on record');}} onCancel={()=>setShowAdd(false)}/></Modal>}
      {editing&&<Modal title="Edit this session" onClose={()=>setEditing(null)} wide><SessForm project={project} initial={editing} onSave={d=>{updateSession(project.id,editing.id,d);setEditing(null);toast('Session updated');}} onCancel={()=>setEditing(null)}/></Modal>}
      {diffV&&<VerifyPanel v={diffV} onClose={()=>setDiffV(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// AGENT TAB  (the core loop UI)
// ═══════════════════════════════════════════════════════════════════════════
function AgentTab({project,activeBranch}) {
  const{generateBrief,logResult,pendingRun,toast,apiKey,accent}=useStore();
  const[tool,setTool]=useState(project.toolStack[0]||'Claude');
  const[instruction,setInstruction]=useState('');
  const[pasteMode,setPasteMode]=useState(false);
  const[pasted,setPasted]=useState('');
  const[pasteErr,setPasteErr]=useState('');
  const[lastV,setLastV]=useState(null);
  const[showV,setShowV]=useState(false);
  const[suggesting,setSuggesting]=useState(false);
  const[critiquing,setCritiquing]=useState(false);
  const[critique,setCritique]=useState(null);
  const[gatesAcked,setGatesAcked]=useState(false);
  const[generatedBrief,setGeneratedBrief]=useState(null);

  const latest=activeBranch[activeBranch.length-1];
  const effectiveInst=instruction.trim()||latest?.nextStep||`Continue: ${project.title}`;
  const isPending=pendingRun?.projectId===project.id;
  const gates=checkRiskGates(project,pendingRun);
  const blockers=gates.filter(g=>g.level==='BLOCK');
  const warnings=gates.filter(g=>g.level==='WARN');
  const hasGates=blockers.length>0||(warnings.length>0&&!gatesAcked);
  const TOOLS=['Tasklet','Claude','ChatGPT','Cursor','Gemini','Copilot','Other'];

  const doGenerate=()=>{
    if(blockers.length>0){toast('Fix blockers before generating brief','error');return;}
    const brief=generateBrief(project.id,effectiveInst,tool);
    if(!brief)return;
    const json=JSON.stringify(brief,null,2);
    navigator.clipboard.writeText(json).then(()=>toast(`Brief copied — paste it into ${tool} to start the run`)).catch(()=>toast('Copy failed — click "Show Brief" to copy manually','warn'));
    setGeneratedBrief(brief);
    setCritique(null);
  };

  const doSuggest=async()=>{
    setSuggesting(true);
    try{const s=await AI.suggestNext(apiKey,project,activeBranch);setInstruction(s);setCritique(null);toast("Here's a suggestion — edit it if needed");}
    catch(e){toast(e.code==='NO_KEY'?'Add API key in Settings':e.message,'error');}
    setSuggesting(false);
  };

  const doCritique=async()=>{
    if(!effectiveInst.trim())return;
    setCritiquing(true);setCritique(null);
    try{const r=await AI.critiqueInstruction(apiKey,effectiveInst,project);setCritique(r);}
    catch(e){toast(e.code==='NO_KEY'?'Add API key in Settings':e.message,'error');}
    setCritiquing(false);
  };

  const doApply=()=>{
    setPasteErr('');
    let data;
    try{data=JSON.parse(pasted.trim());}
    catch(e){setPasteErr(`That doesn't look like valid JSON. Check for missing commas or unclosed brackets. (${e.message.slice(0,60)})`);return;}
    if(!data.outputSummary&&!data.output_summary&&!data.output){
      setPasteErr(`The output is missing a summary of what the agent did. Fields found: ${Object.keys(data).join(', ').slice(0,80)}`);
      return;
    }
    const v=logResult(project.id,data);
    if(v){setLastV(v);setPasteMode(false);setPasted('');}
  };

  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Run an agent</div>
          <div style={{fontSize:11,color:C.muted,marginTop:1,lineHeight:1.5}}>Build a brief, give it to your agent, then paste back what it returned.</div>
        </div>
        {isPending&&<div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:`${C.yellow}0a`,border:`1px solid ${C.yellow}25`,borderRadius:6}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:C.yellow,animation:'pulse 1.2s infinite'}}/>
          <span style={{fontSize:11,...MONO,color:C.yellow}}>waiting for result</span>
        </div>}
      </div>

      {/* Risk gates */}
      {hasGates&&!isPending&&<GateWall gates={gates} onAcknowledge={()=>setGatesAcked(true)}/>}

      {/* Last verification */}
      {lastV&&!isPending&&<div style={{display:'flex',alignItems:'center',gap:8,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',marginBottom:12}}>
        <span style={{fontSize:11,color:C.muted}}>Last run:</span>
        <VBadge v={lastV}/>
        {lastV.errors?.length>0&&<span style={{fontSize:10,color:C.red}}>agent output was incomplete</span>}
        <button style={{...S.btnS,fontSize:11,padding:'3px 9px',marginLeft:'auto'}} onClick={()=>setShowV(true)}>See breakdown</button>
      </div>}

      {/* Session context */}
      {activeBranch.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px',marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:10}}>Where things stand</div>
        {activeBranch.slice(-3).reverse().map((s,i,arr)=>(
          <div key={s.id} style={{display:'flex',gap:8,marginBottom:i<arr.length-1?8:0,paddingBottom:i<arr.length-1?8:0,borderBottom:i<arr.length-1?`1px solid ${C.border}`:'none'}}>
            <span style={{fontSize:9,...MONO,color:accent,background:`${accent}15`,border:`1px solid ${accent}20`,padding:'1px 6px',borderRadius:3,flexShrink:0,height:'fit-content',marginTop:1}}>{s.tool}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:C.text,lineHeight:1.4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{s.outputSummary}</div>
              {s.nextStep&&<div style={{fontSize:10,...MONO,color:accent,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>→ {s.nextStep.slice(0,90)}</div>}
            </div>
            <VBadge v={s.verification}/>
          </div>
        ))}
      </div>}

      {/* Brief generator */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',marginBottom:12}}>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:3}}>Step 1 — Tell the agent what to do</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.55}}>Choose your tool, set the instruction, then copy the brief and paste it into your agent to start a run.</div>
        </div>
        <Field label="Which tool are you running this in?">
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {TOOLS.map(t=><button key={t} onClick={()=>setTool(t)} style={{padding:'5px 11px',borderRadius:5,fontSize:12,fontWeight:600,cursor:'pointer',border:`1px solid ${tool===t?accent:C.border2}`,background:tool===t?`${accent}15`:C.card2,color:tool===t?accent:C.muted,transition:'all .1s'}}>{t}</button>)}
          </div>
        </Field>
        <Field label="What should it do?" hint={latest?.nextStep?`Carries forward: "${latest.nextStep.slice(0,70)}${latest.nextStep.length>70?'…':''}"`:'No previous next step — write one below.'}>
          <div style={{display:'flex',gap:6}}>
            <input style={{...S.input,flex:1}} placeholder="Be specific. The more precise you are, the easier it is to verify the agent actually did it." value={instruction} onChange={e=>{setInstruction(e.target.value);setCritique(null);}}/>
            <AiBtn onClick={doSuggest} loading={suggesting} label="What should I do next?"/>
          </div>
        </Field>

        {/* Critique */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:critique?12:8}}>
          <AiBtn onClick={doCritique} loading={critiquing} label="Is this a good instruction?"/>
          {critique&&<span style={{fontSize:12,color:critique.score>=80?C.green:critique.score>=55?C.yellow:C.red,fontWeight:600}}>{critique.score>=80?'Looks good':critique.score>=55?'Could be sharper':'Needs work'} ({critique.score}/100)</span>}
        </div>
        {critique&&<div style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px',marginBottom:12}}>
          {critique.verdict&&<div style={{fontSize:12,color:C.muted,marginBottom:8,fontStyle:'italic'}}>"{critique.verdict}"</div>}
          {critique.issues?.map((iss,i)=><div key={i} style={{fontSize:11,color:'#fca5a5',display:'flex',gap:5,marginBottom:2}}><span>✗</span>{iss}</div>)}
          {critique.improved&&<div style={{marginTop:8}}>
            <div style={{fontSize:11,fontWeight:600,color:C.green,marginBottom:6}}>Try this instead:</div>
            <div style={{fontSize:12,color:'#86efac',background:`${C.green}06`,border:`1px solid ${C.green}15`,borderRadius:5,padding:'7px 10px',cursor:'pointer',lineHeight:1.5}} onClick={()=>{setInstruction(critique.improved);setCritique(null);}}>"{critique.improved}" <span style={{color:C.faint,fontSize:10}}>click to use this</span></div>
          </div>}
        </div>}

        <button
          style={{...S.btnP,width:'100%',justifyContent:'center',opacity:(blockers.length>0&&!gatesAcked)?0.4:1}}
          onClick={doGenerate}
          disabled={blockers.length>0&&!gatesAcked}
        >
          <I.Copy sz={13}/>{isPending?'Copy new brief (replaces current run)':'Copy brief to clipboard'}
        </button>
        {generatedBrief&&<div style={{marginTop:8}}>
          <button style={{...S.btnS,width:'100%',justifyContent:'center',fontSize:11}} onClick={()=>{navigator.clipboard.writeText(JSON.stringify(generatedBrief,null,2));toast('Brief copied to clipboard');}}>
            <I.Copy sz={11}/>Copy brief again
          </button>
        </div>}
      </div>

      {/* Log result */}
      <div style={{background:C.card,border:`1px solid ${isPending?C.yellow:C.border}`,borderRadius:10,padding:'14px 16px',transition:'border-color .2s'}}>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:isPending?C.yellow:C.text,marginBottom:3,display:'flex',alignItems:'center',gap:8}}>
            {isPending&&<span style={{width:7,height:7,borderRadius:'50%',background:C.yellow,animation:'pulse 1.2s infinite',flexShrink:0}}/>}
            Step 2 — Paste what the agent returned
          </div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.55}}>
            {isPending
              ? "A run is active. When the agent finishes, paste its JSON response here and we'll check whether it actually did what you asked."
              : "Once the agent finishes a run, paste its output here to log the session and verify the work."}
          </div>
        </div>

        {!pasteMode&&<div>
          
          <div style={{display:'flex',gap:6}}>
            <button style={{...S.btnP,flex:1,justifyContent:'center'}} onClick={()=>setPasteMode(true)}><I.Up sz={13}/>Paste agent output</button>
            {isPending&&<button style={{...S.btnS,fontSize:11}} onClick={()=>{if(confirm('Cancel this run? You can generate a new one anytime.')){toast('Run cleared — start a new one when ready');}}}>Cancel this run</button>}
          </div>
        </div>}

        {pasteMode&&<div>
          <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.6}}>Paste the JSON your agent returned. It needs at least three things: what it did (<code style={{...MONO,fontSize:11}}>outputSummary</code>), what changed (<code style={{...MONO,fontSize:11}}>changesMade</code>), and what to do next (<code style={{...MONO,fontSize:11}}>nextStep</code>).</div>
          <textarea style={{...S.textarea,...MONO,fontSize:11,height:160}} placeholder={`{\n  "runId": "${pendingRun?.runId||'run_...'}",\n  "outputSummary": "...",\n  "changesMade": "...",\n  "nextStep": "...",\n  "confidence": 0.85\n}`} value={pasted} onChange={e=>{setPasted(e.target.value);setPasteErr('');}}/> 
          {pasteErr&&<InfoBox type="error">{pasteErr}</InfoBox>}
          <div style={{display:'flex',gap:6,marginTop:8}}>
            <button style={S.btnS} onClick={()=>{setPasteMode(false);setPasted('');setPasteErr('');}}>Cancel</button>
            <button style={{...S.btnP,flex:1,justifyContent:'center',opacity:pasted.trim()?1:.5}} onClick={doApply}>Verify &amp; log this session</button>
          </div>
        </div>}
      </div>

      {/* Session template */}
      {isPending&&<div style={{marginTop:10,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 14px'}}>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8}}>What the agent should return</div>
        <pre style={{fontSize:10,...MONO,color:C.text,background:C.bg,borderRadius:6,padding:'10px',overflow:'auto',maxHeight:200,lineHeight:1.5}}>{JSON.stringify({runId:pendingRun.runId,tool:tool,outputSummary:'',changesMade:'',nextStep:'',producedAssets:[],confidence:null},null,2)}</pre>
        <button style={{...S.btnS,marginTop:6,fontSize:11}} onClick={()=>{navigator.clipboard.writeText(JSON.stringify({runId:pendingRun.runId,tool:tool,outputSummary:'',changesMade:'',nextStep:'',producedAssets:[],confidence:null},null,2));toast('Template copied — paste into your agent');}}>
          <I.Copy sz={11}/>Copy this template for your agent
        </button>
      </div>}

      {showV&&lastV&&<VerifyPanel v={lastV} onClose={()=>setShowV(false)}/>}
    </div>
  );
}

// DECISIONS TAB
// ═══════════════════════════════════════════════════════════════════════════
function DecisionsTab({project}) {
  const{addDecision,deleteDecision,toast,accent}=useStore();
  const[f,setF]=useState({title:'',rationale:'',impact:''});
  const[show,setShow]=useState(false);
  const submit=()=>{if(!f.title.trim())return;addDecision(project.id,f);setF({title:'',rationale:'',impact:''});setShow(false);toast('Decision recorded');};
  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Key decisions</div>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>Record choices that should stick — agents use these to avoid undoing work.</div>
        </div>
        <button style={S.btnP} onClick={()=>setShow(true)}><I.Plus sz={13}/>Record decision</button>
      </div>
      {project.decisions.length===0&&<Empty icon={<I.Star sz={20}/>} title="No decisions recorded" body="When you make a choice that matters — a tech stack pick, a constraint, a direction — log it here. Agents will see it and won't second-guess it." action={<button style={S.btnP} onClick={()=>setShow(true)}><I.Plus sz={13}/>Record a decision</button>}/>}
      {[...project.decisions].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(d=>(
        <div key={d.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,padding:'13px 15px',marginBottom:8,position:'relative'}}>
          <button style={{position:'absolute',top:10,right:10,background:'transparent',border:'none',cursor:'pointer',color:C.faint,padding:3}} onClick={()=>deleteDecision(project.id,d.id)}><I.Trash sz={11}/></button>
          <div style={{fontSize:13,fontWeight:600,color:C.text,paddingRight:24,marginBottom:d.rationale?5:0}}>{d.title}</div>
          {d.rationale&&<div style={{fontSize:12,color:C.muted,lineHeight:1.5,marginBottom:d.impact?4:0}}>{d.rationale}</div>}
          {d.impact&&<div style={{fontSize:11,color:C.faint,fontStyle:'italic'}}>{d.impact}</div>}
          <div style={{fontSize:9,...MONO,color:C.faint,marginTop:6}}>{fmtAgo(d.createdAt)}</div>
        </div>
      ))}
      {show&&<Modal title="Record a decision" onClose={()=>setShow(false)}>
        <Field label="What was decided?"><input style={S.input} autoFocus value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))} placeholder="e.g. Use GPT-4o for all inference, not Claude"/></Field>
        <Field label="Why?" hint="One or two sentences is enough."><textarea style={{...S.textarea,height:64}} value={f.rationale} onChange={e=>setF(p=>({...p,rationale:e.target.value}))} placeholder="Why did you go this way?"/></Field>
        <Field label="What does this affect?" hint="Optional — helps agents understand scope."><input style={S.input} value={f.impact} onChange={e=>setF(p=>({...p,impact:e.target.value}))} placeholder="e.g. All inference routes through GPT-4o from here on"/></Field>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
          <button style={S.btnS} onClick={()=>setShow(false)}>Cancel</button>
          <button style={{...S.btnP,opacity:f.title.trim()?1:.5}} onClick={submit}>Save</button>
        </div>
      </Modal>}
    </div>
  );
}

// ASSETS TAB
// ═══════════════════════════════════════════════════════════════════════════
function AssetsTab({project}) {
  const{addAsset,deleteAsset,toast,accent}=useStore();
  const[show,setShow]=useState(false);
  const[view,setView]=useState(null);
  const[f,setF]=useState({name:'',type:'prompt',content:''});
  const TC={prompt:accent,code:C.blue,doc:C.green,note:C.yellow,spec:'#c084fc',output:'#06b6d4'};
  const submit=()=>{if(!f.name.trim())return;addAsset(project.id,f);setF({name:'',type:'prompt',content:''});setShow(false);toast('Saved to assets');};
  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Files & assets</div>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>Store prompts, code, specs, and outputs here so agents can reference them.</div>
        </div>
        <button style={S.btnP} onClick={()=>setShow(true)}><I.Plus sz={13}/>Add</button>
      </div>
      {project.assets.length===0&&<Empty icon={<I.Copy sz={20}/>} title="Nothing saved yet" body="Save prompts, architecture docs, code snippets, or any output worth keeping. Paste it here and it stays with the project."/>}
      {project.assets.map(a=>(
        <div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,padding:'11px 14px',marginBottom:7,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:9,...MONO,fontWeight:700,background:`${TC[a.type]||C.muted}18`,color:TC[a.type]||C.muted,border:`1px solid ${TC[a.type]||C.muted}25`,padding:'1px 6px',borderRadius:3,flexShrink:0}}>{a.type}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</div>
            <div style={{fontSize:10,...MONO,color:C.faint}}>{a.content?`${(a.content.length/1000).toFixed(1)}k chars`:''}</div>
          </div>
          <span style={{fontSize:9,...MONO,color:C.faint}}>{fmtAgo(a.createdAt)}</span>
          <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.faint,padding:3}} onClick={()=>setView(a)}><I.Eye sz={13}/></button>
          <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.faint,padding:3}} onClick={()=>deleteAsset(project.id,a.id)}><I.Trash sz={13}/></button>
        </div>
      ))}
      {show&&<Modal title="Save an asset" onClose={()=>setShow(false)} wide>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:12}}>
          <Field label="Name *"><input style={S.input} autoFocus value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="architecture.md"/></Field>
          <Field label="Type"><select style={{...S.select,width:100}} value={f.type} onChange={e=>setF(p=>({...p,type:e.target.value}))}>{'prompt,code,doc,note,spec,output'.split(',').map(t=><option key={t}>{t}</option>)}</select></Field>
        </div>
        <Field label="Content"><textarea style={{...S.textarea,...MONO,fontSize:11,height:160}} value={f.content} onChange={e=>setF(p=>({...p,content:e.target.value}))} placeholder="Paste content, code, or notes…"/></Field>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
          <button style={S.btnS} onClick={()=>setShow(false)}>Cancel</button>
          <button style={{...S.btnP,opacity:f.name.trim()?1:.5}} onClick={submit}>Save</button>
        </div>
      </Modal>}
      {view&&<Modal title={view.name} subtitle={`${view.type} · ${fmtAgo(view.createdAt)}`} onClose={()=>setView(null)} wide>
        <div style={{display:'flex',gap:6,marginBottom:10,justifyContent:'flex-end'}}>
          <button style={S.btnS} onClick={()=>{navigator.clipboard.writeText(view.content||'');toast('Copied to clipboard');}}>Copy</button>
        </div>
        <pre style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:7,padding:'12px',...MONO,fontSize:11,color:C.text,overflowX:'auto',whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:400,overflowY:'auto',lineHeight:1.6}}>{view.content||'(empty)'}</pre>
      </Modal>}
    </div>
  );
}

// TASKS TAB
// ═══════════════════════════════════════════════════════════════════════════
function TasksTab({project}) {
  const{addTask,updateTask,deleteTask,toast,accent}=useStore();
  const[show,setShow]=useState(false);
  const[f,setF]=useState({title:'',status:'todo',owner:'',notes:''});
  const CYCLE={todo:'in_progress',in_progress:'blocked',blocked:'done',done:'todo'};
  const ST={todo:{bg:C.card2,c:C.muted,lbl:'TODO'},in_progress:{bg:`${C.blue}15`,c:C.blue,lbl:'IN PROGRESS'},blocked:{bg:`${C.red}15`,c:C.red,lbl:'BLOCKED'},done:{bg:`${C.green}15`,c:C.green,lbl:'DONE'}};
  const submit=()=>{if(!f.title.trim())return;addTask(project.id,f);setF({title:'',status:'todo',owner:'',notes:''});setShow(false);toast('Task added');};
  const open=project.tasks.filter(t=>t.status!=='done').length;
  const done=project.tasks.filter(t=>t.status==='done').length;
  const pct=project.tasks.length>0?Math.round(done/project.tasks.length*100):0;
  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Tasks</div>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>{open} open{project.tasks.filter(t=>t.status==='blocked').length>0?` · ${project.tasks.filter(t=>t.status==='blocked').length} blocked`:''}</div>
        </div>
        <button style={S.btnP} onClick={()=>setShow(true)}><I.Plus sz={13}/>Add</button>
      </div>
      {project.tasks.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
          <span style={{fontSize:11,color:C.muted}}>{done}/{project.tasks.length} complete</span>
          <span style={{fontSize:12,fontWeight:700,color:pct===100?C.green:C.text,...MONO}}>{pct}%</span>
        </div>
        <div style={{height:4,background:C.card2,borderRadius:4}}><div style={{height:4,background:pct===100?C.green:accent,borderRadius:4,width:`${pct}%`,transition:'width .4s ease'}}/></div>
      </div>}
      {project.tasks.length===0&&<Empty icon={<I.Check sz={20}/>} title="No tasks yet" body="Break the work down into pieces. Mark them as you go — it's the easiest way to see what's actually left to do."/>}
      {['in_progress','blocked','todo','done'].map(status=>{
        const items=project.tasks.filter(t=>t.status===status);
        if(!items.length)return null;
        const s=ST[status];
        return(<div key={status} style={{marginBottom:14}}>
          <div style={{fontSize:9,...MONO,fontWeight:600,color:C.muted,textTransform:'uppercase',marginBottom:6}}>{s.lbl} ({items.length})</div>
          {items.map(t=>(
            <div key={t.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',marginBottom:5,display:'flex',alignItems:'center',gap:8}}>
              <button onClick={()=>updateTask(project.id,t.id,{status:CYCLE[t.status]})} style={{fontSize:8,...MONO,fontWeight:700,background:s.bg,color:s.c,border:'none',padding:'2px 6px',borderRadius:3,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>{s.lbl}</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:500,color:t.status==='done'?C.muted:C.text,textDecoration:t.status==='done'?'line-through':''}}>{t.title}</div>
                {(t.owner||t.notes)&&<div style={{fontSize:10,color:C.faint,marginTop:1}}>{t.owner&&<span style={{marginRight:6}}>@{t.owner}</span>}{t.notes}</div>}
              </div>
              <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.faint,padding:3}} onClick={()=>deleteTask(project.id,t.id)}><I.Trash sz={11}/></button>
            </div>
          ))}
        </div>);
      })}
      {show&&<Modal title="Add a task" onClose={()=>setShow(false)}>
        <Field label="What needs to happen?"><input style={S.input} autoFocus value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="e.g. Reindex Pinecone embeddings"/></Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Status"><select style={S.select} value={f.status} onChange={e=>setF(p=>({...p,status:e.target.value}))}>{'todo,in_progress,blocked,done'.split(',').map(s=><option key={s}>{s.replace('_',' ')}</option>)}</select></Field>
          <Field label="Owner"><input style={S.input} value={f.owner} onChange={e=>setF(p=>({...p,owner:e.target.value}))} placeholder="Person or team"/></Field>
        </div>
        <Field label="Notes"><input style={S.input} value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))}/></Field>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
          <button style={S.btnS} onClick={()=>setShow(false)}>Cancel</button>
          <button style={{...S.btnP,opacity:f.title.trim()?1:.5}} onClick={submit}>Add Task</button>
        </div>
      </Modal>}
    </div>
  );
}

// HANDOFFS TAB
// ═══════════════════════════════════════════════════════════════════════════
function HandoffsTab({project,activeBranch}) {
  const{addHandoff,toast,accent}=useStore();
  const[view,setView]=useState(null);
  const TOOLS=['Claude','ChatGPT','Tasklet','Cursor','Gemini','Copilot','Custom'];
  const gen=t=>{const h=buildHandoff(project,t,activeBranch);addHandoff(project.id,h);toast(`Handoff for ${t} is ready`);};
  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Handoffs</div>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>Pass full context to a different agent or tool without losing anything.</div>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {TOOLS.slice(0,4).map(t=><button key={t} style={S.btnS} onClick={()=>gen(t)}><I.Send sz={11}/>→{t}</button>)}

      </div>
      <InfoBox type="info">A handoff is a self-contained brief — it tells the next agent everything it needs to know about where things stand, what was decided, and exactly what to do next. It also includes a return template so the agent knows how to report back.</InfoBox>
      {project.handoffs.length===0&&<Empty icon={<I.Send sz={20}/>} title="No handoffs yet" body="When you're switching tools or handing off to someone else, generate a handoff. It's a complete brief — past context, current state, and the next instruction — all in one block."/>}
      {[...project.handoffs].reverse().map(h=>(
        <div key={h.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{fontSize:9,...MONO,fontWeight:700,color:C.blue,background:`${C.blue}15`,border:`1px solid ${C.blue}20`,padding:'1px 6px',borderRadius:3}}>→ {h.targetTool}</span>
            <span style={{fontSize:9,...MONO,color:C.faint,marginLeft:'auto'}}>{fmtAgo(h.generatedAt)}</span>
            <button style={S.btnS} onClick={()=>setView(h)}><I.Eye sz={11}/>View</button>
            <button style={{...S.btnS,fontSize:12}} title="Copy as readable text (not JSON)" onClick={()=>{const txt=`PROJECT: ${h.project?.title}\n\nOBJECTIVE: ${h.project?.objective}\n\nCURRENT STATE:\n${h.context?.currentState}\n\nCONSTRAINTS:\n${(h.project?.constraints||[]).map(c=>`• ${c}`).join('\n')}\n\nNEXT INSTRUCTION:\n${h.instruction?.exactNext}`;navigator.clipboard.writeText(txt);toast('Plain text copied');}}><I.Copy sz={11}/>Text</button>
            <button style={S.btnS} onClick={()=>{navigator.clipboard.writeText(JSON.stringify(h,null,2));toast('JSON copied');}}><I.Copy sz={11}/>JSON</button>
          </div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.5,marginBottom:6}}>{h.project?.objective?.slice(0,120)}</div>
          <div style={{background:`${accent}08`,border:`1px solid ${accent}18`,borderRadius:6,padding:'7px 10px',display:'flex',gap:6,fontSize:11,color:C.text}}>
            <span style={{color:accent,flexShrink:0}}>→</span>{h.instruction?.exactNext?.slice(0,120)}
          </div>
        </div>
      ))}
      {view&&<Modal title={`Handoff → ${view.targetTool}`} onClose={()=>setView(null)} wide>
        <pre style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:7,padding:'12px',...MONO,fontSize:10,color:C.text,overflowX:'auto',whiteSpace:'pre-wrap',maxHeight:480,overflowY:'auto',lineHeight:1.5}}>{JSON.stringify(view,null,2)}</pre>
        <div style={{marginTop:10,display:'flex',gap:6,justifyContent:'flex-end'}}>
          <button style={S.btnP} onClick={()=>{navigator.clipboard.writeText(JSON.stringify(view,null,2));toast('Copied to clipboard');}}>Copy JSON</button>
        </div>
      </Modal>}
    </div>
  );
}

// RISKS TAB
// ═══════════════════════════════════════════════════════════════════════════
function RisksTab({project,activeBranch}) {
  const{toast,apiKey,accent}=useStore();
  const[heuristic,setHeuristic]=useState(()=>checkRiskGates(project,null));
  const[aiFlags,setAiFlags]=useState([]);
  const[analyzing,setAnalyzing]=useState(false);
  const[dismissed,setDismissed]=useState(new Set());

  useEffect(()=>setHeuristic(checkRiskGates(project,null)),[project.sessions.length,project.tasks.length,project.objective]);

  const analyze=async()=>{
    setAnalyzing(true);setAiFlags([]);
    try{
      const r=await AI.analyzeRisks(apiKey,project,activeBranch);
      setAiFlags(r);toast(`${r.length} issue${r.length!==1?'s':''} found — take a look`);
    }catch(e){toast(e.code==='NO_KEY'?'Add API key in Settings':e.message,'error');}
    setAnalyzing(false);
  };

  const SEV={high:0,medium:1,low:2};
  const allFlags=[...heuristic,...aiFlags].filter(f=>!dismissed.has(f.id)).sort((a,b)=>(SEV[a.severity]||3)-(SEV[b.severity]||3));

  return(
    <div style={{padding:20,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Project health</div>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>Automatic checks for things that tend to go wrong. Fix these before your next run.</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button style={S.btnS} onClick={()=>{setHeuristic(checkRiskGates(project,null));toast('Health checks updated');}}><I.Refresh sz={12}/>Re-check</button>
          <AiBtn onClick={analyze} loading={analyzing} label="Analyze my sessions"/>
        </div>
      </div>
      {allFlags.length===0&&<Empty icon={<I.Shield sz={20}/>} title="No issues found" body="Everything looks clean. If you want a deeper read on how the sessions are going, run the AI analysis — it looks at patterns across your history."/>}
      {aiFlags.length>0&&<div style={{fontSize:11,fontWeight:600,color:C.orange,marginBottom:10}}>✦ From the AI analysis</div>}
      {allFlags.map(r=>{
        const sev={high:{bg:`${C.red}06`,border:`${C.red}20`,c:C.red},medium:{bg:`${C.yellow}06`,border:`${C.yellow}20`,c:C.yellow},BLOCK:{bg:`${C.red}08`,border:`${C.red}28`,c:C.red},WARN:{bg:`${C.yellow}06`,border:`${C.yellow}20`,c:C.yellow}}[r.severity||r.level]||{bg:`${C.blue}06`,border:`${C.blue}20`,c:C.blue};
        return(
          <div key={r.id||r.code} style={{background:sev.bg,border:`1px solid ${sev.border}`,borderRadius:9,padding:'12px 14px',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
              <span style={{fontSize:9,...MONO,fontWeight:700,background:sev.bg,color:sev.c,padding:'1px 6px',borderRadius:3,border:`1px solid ${sev.border}`}}>{(r.severity||r.level||'').toUpperCase()}</span>
              {r.source==='ai'&&<span style={{fontSize:9,...MONO,color:accent,background:`${accent}12`,border:`1px solid ${accent}20`,padding:'1px 5px',borderRadius:3}}>AI</span>}
              <span style={{fontSize:12,fontWeight:600,color:C.text,flex:1,...MONO}}>{(r.code||r.type||'').split('_').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ')}</span>
              <button onClick={()=>setDismissed(p=>new Set([...p,r.id||r.code]))} style={{fontSize:10,color:C.faint,background:'transparent',border:'none',cursor:'pointer',...MONO}}>dismiss</button>
            </div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.55,marginBottom:(r.fix||r.recommendation)?6:0}}>{r.msg||r.message}</div>
            {(r.fix||r.recommendation)&&<div style={{fontSize:11,color:sev.c,display:'flex',gap:5}}><span style={{flexShrink:0}}>→</span><span>{r.fix||r.recommendation}</span></div>}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const store = useAppStore();
  const [tab, setTab] = useState('Overview');
  const [showCreate, setShowCreate] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [search, setSearch] = useState('');
  const [showArchived, setShowArchived] = useState(false);
  const importRef = useRef(null);

  // Keyboard shortcuts
  useEffect(() => {
    const TABS_KEYS = TABS.map(t => t.id);
    const h = e => {
      if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
      if (e.key==='n'&&!e.metaKey&&!e.ctrlKey) { setShowCreate(true); return; }
      if (e.key===','&&(e.metaKey||e.ctrlKey)) { e.preventDefault(); setShowSettings(true); return; }
      if (e.key==='Escape') { setShowCreate(false); setShowSettings(false); return; }
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= 9 && !e.metaKey && !e.ctrlKey) { const t = TABS_KEYS[n-1]; if(t) setTab(t); }
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, []);

  // Listen for openSettings events from child components
  useEffect(() => {
    const h = () => setShowSettings(true);
    document.addEventListener('tos:openSettings', h);
    return () => document.removeEventListener('tos:openSettings', h);
  }, []);

  // Incoming share link
  useEffect(() => {
    const shared = getIncomingShare();
    if (shared) {
      history.replaceState(null, '', location.pathname);
      if (!store.projects.find(p => p.title === shared.title)) {
        store.importAll(JSON.stringify({projects:[{...shared,id:genId()}]}));
      } else {
        store.toast(`"${shared.title}" already exists`, 'warn');
      }
    }
  }, []); // eslint-disable-line

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return store.projects.filter(p => {
      if (!showArchived && p.status === 'archived') return false;
      return p.title.toLowerCase().includes(q) || (p.objective||'').toLowerCase().includes(q);
    });
  }, [store.projects, search, showArchived]);

  const archivedCount = store.projects.filter(p => p.status === 'archived').length;
  const p = store.active;
  const TabComp = p ? TABS.find(t => t.id === tab)?.comp : null;
  const gates = p ? checkRiskGates(p, store.pendingRun) : [];
  const blockCount = gates.filter(g => g.level === 'BLOCK').length;
  const isPending = store.pendingRun?.projectId === p?.id;
  const accent = store.accent;

  return (
    <StoreCtx.Provider value={store}>
      <style>{`
        .proj-menu-btn{opacity:0!important;}
        div:hover>.proj-menu-btn,.proj-menu-btn:focus{opacity:0.5!important;}
        .proj-menu-btn:hover{opacity:1!important;}
        input:focus,textarea:focus,select:focus{border-color:rgba(249,115,22,.4)!important;box-shadow:0 0 0 3px rgba(249,115,22,.08);}
      `}</style>

      <div style={{display:'flex',height:'100%',background:C.bg,overflow:'hidden'}}>

        {/* ── SIDEBAR ── */}
        <div style={{width:210,flexShrink:0,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden'}}>

          {/* Logo */}
          <div style={{padding:'14px 14px 12px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:9,flexShrink:0}}>
            <div style={{width:28,height:28,background:C.orange,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Layers sz={14} c="white"/></div>
            <div style={{flex:1,overflow:'hidden',minWidth:0}}>
              <div style={{display:'flex',alignItems:'baseline',gap:5}}>
                <span style={{fontWeight:800,fontSize:15,color:C.text}}>ThreadOS</span>
                <span style={{fontSize:9,...MONO,color:C.faint}}>v{VERSION}</span>
              </div>
              <div style={{fontSize:9,...MONO,color:C.faint}}>{store.projects.filter(p=>p.status==='active').length} active · {store.projects.length} total</div>
            </div>
            <button
              onClick={()=>setShowSettings(true)}
              title="Settings (⌘,)"
              style={{...S.btnG,padding:5,border:'none',background:'transparent',color:store.apiKey?C.muted:C.orange,flexShrink:0,position:'relative'}}
            >
              <I.Gear sz={14}/>
              {!store.apiKey&&<span style={{position:'absolute',top:2,right:2,width:5,height:5,borderRadius:'50%',background:C.orange}}/>}
            </button>
          </div>

          {/* Search */}
          <div style={{padding:'10px 10px 6px',flexShrink:0}}>
            <input style={{...S.input,fontSize:12,padding:'7px 10px'}} placeholder="Search projects…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>

          {/* Project list */}
          <div style={{flex:1,overflowY:'auto',padding:'4px 8px'}}>
            {filtered.map(proj => (
              <ProjectItem key={proj.id} proj={proj}
                active={store.activeId===proj.id}
                pending={store.pendingRun?.projectId===proj.id}
                onClick={()=>{store.setActiveId(proj.id);setTab('Overview');}}
                onClone={()=>store.cloneProject(proj.id)}
                onExport={()=>store.exportProject(proj.id)}
                onRename={t=>store.updateProject(proj.id,{title:t})}
                onDelete={()=>{if(confirm(`Delete "${proj.title}"?`))store.deleteProject(proj.id);}}
                onArchive={()=>store.updateProject(proj.id,{status:proj.status==='archived'?'active':'archived'})}
              />
            ))}
            {filtered.length===0&&<div style={{fontSize:11,color:C.faint,padding:'16px 8px',textAlign:'center'}}>{search?`No results for "${search}"`:showArchived?'No projects':'No active projects'}</div>}
            {archivedCount>0&&!search&&<button onClick={()=>setShowArchived(v=>!v)} style={{width:'100%',padding:'5px 8px',background:'transparent',border:'none',cursor:'pointer',fontSize:10,...MONO,color:C.faint,textAlign:'left'}}>
              {showArchived?'▾ hide':'▸ show'} archived ({archivedCount})
            </button>}
          </div>

          {/* API key indicator */}
          <div style={{padding:'0 8px 4px',flexShrink:0}}>
            <button onClick={()=>setShowSettings(true)} style={{width:'100%',display:'flex',alignItems:'center',gap:6,padding:'6px 8px',background:store.apiKey?`${C.green}08`:`${C.orange}08`,border:`1px solid ${store.apiKey?`${C.green}20`:`${C.orange}20`}`,borderRadius:6,cursor:'pointer'}}>
              <span style={{width:5,height:5,borderRadius:'50%',background:store.apiKey?C.green:C.orange,flexShrink:0}}/>
              <span style={{fontSize:9,...MONO,color:store.apiKey?C.green:C.orange,flex:1}}>{store.apiKey?'✦ AI features on':'Add API key to unlock AI'}</span>
              <I.Key sz={9} c={store.apiKey?C.green:C.orange}/>
            </button>
          </div>

          {/* Help link */}
          <div style={{padding:'0 8px 4px',flexShrink:0}}>
            <a href="docs/agent-manual.html" target="_blank" rel="noopener noreferrer" style={{width:'100%',display:'flex',alignItems:'center',gap:6,padding:'6px 8px',background:`${C.blue}08`,border:`1px solid ${C.blue}20`,borderRadius:6,cursor:'pointer',textDecoration:'none'}}>
              <span style={{fontSize:12,lineHeight:1}}>?</span>
              <span style={{fontSize:9,...MONO,color:C.blue,flex:1}}>Agent Manual</span>
              <I.Link sz={9} c={C.blue}/>
            </a>
          </div>

          {/* Bottom actions */}
          <div style={{padding:'0 8px 8px',borderTop:`1px solid ${C.border}`,paddingTop:8,display:'flex',gap:4,flexShrink:0}}>
            <button style={{...S.btnG,flex:1,justifyContent:'center',fontSize:11}} onClick={store.exportAll}><I.Down sz={12}/>Export</button>
            <button style={{...S.btnG,flex:1,justifyContent:'center',fontSize:11}} onClick={()=>importRef.current?.click()}><I.Up sz={12}/>Import</button>
            <button style={{...S.btnP,flex:1,justifyContent:'center',fontSize:11}} onClick={()=>setShowCreate(true)}><I.Plus sz={12}/>New</button>
          </div>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>store.importAll(ev.target.result);r.readAsText(f);e.target.value='';}}/>
        </div>

        {/* ── MAIN ── */}
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
          {p ? (
            <>
              {/* Tab bar */}
              <div style={{borderBottom:`1px solid ${C.border}`,background:C.surface,flexShrink:0,display:'flex',alignItems:'stretch',paddingLeft:2,overflowX:'auto'}}>
                {TABS.map((t,i) => {
                  const isActive = tab === t.id;
                  const badge = t.id==='Risks'&&blockCount>0 ? blockCount : t.id==='Agent'&&isPending ? '•' : null;
                  return(
                    <button key={t.id} onClick={()=>setTab(t.id)} title={`${t.id} — press ${i+1}`} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'10px 14px',fontSize:12,fontWeight:isActive?600:400,color:isActive?(t.accent?C.orange:C.text):C.muted,background:'transparent',border:'none',borderBottom:`2px solid ${isActive?(t.accent?C.orange:C.text):'transparent'}`,cursor:'pointer',transition:'all .12s',whiteSpace:'nowrap',position:'relative',flexShrink:0}}>
                      <span style={{color:isActive?(t.accent?accent:C.text):C.faint}}>{t.icon}</span>
                      {t.id}
                      {badge&&<span style={{fontSize:9,...MONO,fontWeight:700,background:t.id==='Risks'?C.red:C.yellow,color:'white',borderRadius:'50%',minWidth:14,height:14,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 2px'}}>{badge}</span>}
                    </button>
                  );
                })}
              </div>

              {/* Tab content */}
              <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
                {TabComp&&<TabComp project={p} activeBranch={store.activeBranch} onTab={setTab}/>}
              </div>
            </>
          ) : (
            <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
              <div style={{width:56,height:56,background:C.card,border:`1px solid ${C.border}`,borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',color:C.faint}}><I.Layers sz={24}/></div>
              <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>Welcome to ThreadOS</div>
              <div style={{fontSize:13,color:C.muted,maxWidth:340,textAlign:'center',lineHeight:1.6,marginBottom:2}}>
                ThreadOS keeps track of what your AI agents actually do — not just what you asked them to do.
              </div>
              <div style={{fontSize:12,color:C.faint,maxWidth:300,textAlign:'center',lineHeight:1.6,marginBottom:8}}>
                Create a project, write a brief, run your agent, paste back the result. ThreadOS verifies it and builds your history.
              </div>
              <button style={{...S.btnP}} onClick={()=>setShowCreate(true)}><I.Plus sz={14}/>Start a project</button>
              <div style={{fontSize:11,color:C.faint,marginTop:8}}>or press <kbd style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:4,padding:'1px 6px',fontSize:10,...MONO}}>N</kbd> anywhere</div>
            </div>
          )}
        </div>
      </div>

      {/* ── TOASTS ── */}
      <div style={{position:'fixed',bottom:20,right:20,zIndex:3000,display:'flex',flexDirection:'column',gap:6}}>
        {store.toasts.map(t=>{
          const cfg={info:{border:C.border2,ic:'✓',c:C.text},warn:{border:`${C.yellow}35`,ic:'⚠',c:C.yellow},error:{border:`${C.red}35`,ic:'✕',c:C.red}};
          const s=cfg[t.type]||cfg.info;
          return(
            <div key={t.id} style={{background:C.card,border:`1px solid ${s.border}`,borderRadius:8,padding:'9px 14px',display:'flex',alignItems:'center',gap:9,minWidth:220,maxWidth:320,boxShadow:'0 8px 32px rgba(0,0,0,.5)',animation:'toastIn .18s ease-out'}}>
              <span style={{color:s.c,fontWeight:700,fontSize:13,flexShrink:0}}>{s.ic}</span>
              <span style={{fontSize:12,color:C.text,flex:1}}>{t.msg}</span>
              <button style={{background:'transparent',border:'none',cursor:'pointer',color:C.faint,fontSize:14,padding:'0 0 0 6px',flexShrink:0}} onClick={()=>store.dismissToast(t.id)}>×</button>
            </div>
          );
        })}
      </div>

      {showCreate&&<CreateModal onClose={()=>setShowCreate(false)}/>}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)}/>}
    </StoreCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
